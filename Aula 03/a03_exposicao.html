<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Exposi&#231;&#227;o &mdash; Do DER ao SQL &middot; Aula 03</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;gap:8px;flex-wrap:wrap;min-height:52px}
.badge{background:#15803d;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-title{font-size:14px;font-weight:600}.hdr-sub{font-size:12px;color:#94a3b8;margin-top:1px}
.timer{font-size:13px;font-weight:500;background:#f1f5f9;padding:5px 14px;border-radius:8px;border:1px solid #e2e8f0;font-family:monospace;color:#475569;min-width:64px;text-align:center}
.timer.warn{color:#d97706;background:#fffbeb}.timer.danger{color:#dc2626;background:#fef2f2}
.dots{display:flex;align-items:center;gap:5px;padding:9px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;overflow-x:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:#15803d;transform:scale(1.4)}.dot.done{background:#15803d;opacity:.4}
.dsep{width:10px;height:1px;background:#e2e8f0;flex-shrink:0}
.slide-area{flex:1;overflow-y:auto;padding:22px 28px}
.slide{display:none}.slide.active{display:block;animation:sIn .22s ease}
@keyframes sIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ey{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#15803d;margin-bottom:5px}
.stitle{font-size:21px;font-weight:600;color:#1e293b;line-height:1.2;margin-bottom:5px}
.ssub{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px}
.card.ac{border-left:3px solid #15803d}
.ci{font-size:18px;margin-bottom:5px}.ct{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.cb{font-size:12px;color:#64748b;line-height:1.5}
.cw{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin:10px 0}
.ch{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:7px 13px;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:500;color:#64748b}
.cd{display:flex;gap:5px}.c1{width:10px;height:10px;border-radius:50%}
pre{background:#1e293b;color:#e2e8f0;padding:13px 16px;font-size:12px;line-height:1.8;overflow-x:auto;font-family:monospace;white-space:pre;margin:0}
.hl{background:#f0fdf4;border-left:3px solid #15803d;padding:10px 13px;font-size:12.5px;color:#14532d;line-height:1.55;margin:10px 0}
.hl strong{color:#15803d}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:560px){.two-col{grid-template-columns:1fr}}
.qb{margin-bottom:16px}.qa{font-size:13.5px;font-weight:600;color:#1e293b;margin-bottom:11px;line-height:1.5}
.qo{display:flex;flex-direction:column;gap:7px}
.qop{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:9px;transition:all .15s;color:#1e293b}
.qop:hover:not(.correct):not(.wrong):not(.dimmed){border-color:#15803d;background:#f0fdf4}
.qop.correct{background:#f0fdf4;border-color:#86efac;color:#15803d;pointer-events:none}
.qop.wrong{background:#fef2f2;border-color:#fca5a5;color:#dc2626;pointer-events:none}
.qop.dimmed{opacity:.4;pointer-events:none}
.qfb{margin-top:9px;padding:9px 13px;border-radius:8px;font-size:12.5px;line-height:1.5;display:none}
.rl{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ri{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px}
.rn{width:23px;height:23px;min-width:23px;border-radius:6px;background:#86efac;color:#15803d;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rt{font-size:13px;color:#64748b;line-height:1.55}.rt strong{color:#1e293b;font-weight:600}
.comp-table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0}
.comp-table thead tr th{background:#15803d;color:#fff;padding:7px 10px;text-align:left;font-weight:600}
.comp-table tbody tr td{padding:7px 10px;border-bottom:1px solid #e2e8f0;color:#475569;vertical-align:top}
.comp-table tbody tr:nth-child(even){background:#f8fafc}
.rtbl{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.rtbl thead tr th{background:#15803d;color:#fff;padding:6px 10px;text-align:left}
.rtbl tbody tr td{padding:6px 10px;border-bottom:1px solid #e2e8f0;color:#475569}
.rtbl tbody tr:nth-child(even){background:#f8fafc}
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.nb{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:7px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:#e2e8f0}.nb.pr{background:#15803d;color:#fff;border-color:#15803d}
.nb:disabled{opacity:.35;pointer-events:none}.nc{font-size:12px;color:#94a3b8}
.kz-footer{height:32px;background:#1e293b;display:flex;align-items:center;justify-content:center;gap:10px;flex-shrink:0}
.kz-footer a{color:#90caf9;font-size:11px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:5px}
.kz-footer a:hover{color:#bbdefb}.kz-footer span{color:#475569;font-size:11px}
.next-stage{font-size:12px;font-weight:600;background:#fff;border:1.5px solid #15803d;color:#15803d;padding:5px 13px;border-radius:8px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.next-stage:hover{background:#f0fdf4}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:11px">
      <span class="badge">Aula 03</span>
      <div><div class="hdr-title">Do DER ao SQL &mdash; Exposi&#231;&#227;o Dialogada</div>
      <div class="hdr-sub">45 minutos &middot; Projetor &middot; Turma</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
      <div class="timer" id="timer">45:00</div>
      <button class="next-stage" onclick="window.location.href='a03_demo_ao_vivo.html'">&#128187; Demo &rarr;</button>
    </div>
  </div>
  <div class="dots" id="dots-bar"></div>
  <div class="slide-area" id="slide-area"></div>
  <div class="nav">
    <button class="nb" id="btn-prev" onclick="goNav(-1)" disabled>&#8592; Anterior</button>
    <span class="nc" id="counter">1 / 8</span>
    <button class="nb pr" id="btn-next" onclick="goNav(1)">Pr&#243;ximo &#8594;</button>
  </div>
  <div class="kz-footer"><a href="https://instagram.com/karizeviecelli" target="_blank" rel="noopener"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>@karizeviecelli</a><span>·</span><span>© 2026</span></div>
</div>
<script>
var SLIDES=[
function(){return ["<div class=\"ey\">Abertura &middot; 3 min</div>","<div class=\"stitle\">Temos o modelo — agora vamos criar o banco de verdade</div>","<div class=\"ssub\">Na Aula 02 desenhamos o DER com entidades, atributos e cardinalidade. Hoje esse diagrama vira SQL real rodando no MySQL Workbench.</div>","<div class=\"cards\">","<div class=\"card ac\"><div class=\"ci\">&#128190;</div><div class=\"ct\">DER &rarr; Tabelas</div><div class=\"cb\">Cada entidade do DER vira uma tabela. Cada atributo vira uma coluna. Os relacionamentos viram FKs.</div></div>","<div class=\"card ac\"><div class=\"ci\">&#128273;</div><div class=\"ct\">PRIMARY KEY</div><div class=\"cb\">Identifica cada linha de forma única. Usaremos INT AUTO_INCREMENT — o banco gera o número automaticamente.</div></div>","<div class=\"card\"><div class=\"ci\">&#128279;</div><div class=\"ct\">FOREIGN KEY</div><div class=\"cb\">Coluna que aponta para a PK de outra tabela. Garante que não existe produto com categoria inexistente.</div></div>","<div class=\"card\"><div class=\"ci\">&#127919;</div><div class=\"ct\">O que veremos</div><div class=\"cb\">CREATE DATABASE, CREATE TABLE, tipos de dados, INSERT na ordem certa, SELECT básico e EER no Workbench.</div></div>","</div>"].join('');},
function(){return ["<div class=\"ey\">Tipos de dados &middot; 4 min</div>","<div class=\"stitle\">Escolhendo o tipo certo para cada coluna</div>","<div class=\"ssub\">Cada coluna precisa de um tipo de dado. O tipo determina quanto espaço ocupa e quais valores são aceitos.</div>","<table class=\"comp-table\"><thead><tr><th>Tipo</th><th>Uso</th><th>Exemplo</th></tr></thead>","<tbody>","<tr><td><strong>INT</strong></td><td>N&uacute;meros inteiros</td><td>id, estoque, quantidade</td></tr>","<tr><td><strong>DECIMAL(10,2)</strong></td><td>Valores monet&aacute;rios</td><td>preco = 129.90</td></tr>","<tr><td><strong>VARCHAR(n)</strong></td><td>Texto de tamanho vari&aacute;vel</td><td>nome, email</td></tr>","<tr><td><strong>DATE</strong></td><td>Data sem hora</td><td>2026-01-15</td></tr>","<tr><td><strong>TINYINT(1)</strong></td><td>Booleano (0/1)</td><td>ativo = 1</td></tr>","</tbody></table>","<div class=\"hl\"><strong>DECIMAL(10,2)</strong> = at&eacute; 10 d&iacute;gitos no total, 2 ap&oacute;s a v&iacute;rgula. Use DECIMAL para dinheiro, nunca FLOAT (FLOAT tem erros de arredondamento).</div>"].join('');},
function(){return ["<div class=\"ey\">CREATE TABLE &middot; 5 min</div>","<div class=\"stitle\">Estrutura do CREATE TABLE</div>","<div class=\"cw\"><div class=\"ch\"><span>SQL &middot; CREATE TABLE com FK</span><div class=\"cd\"><div class=\"c1\" style=\"background:#ef4444\"></div><div class=\"c1\" style=\"background:#f59e0b\"></div><div class=\"c1\" style=\"background:#10b981\"></div></div></div>","<pre>CREATE TABLE produto (\n  id_produto   INT AUTO_INCREMENT,\n  id_categoria INT          NOT NULL,\n  nome         VARCHAR(100) NOT NULL,\n  preco        DECIMAL(10,2) NOT NULL,\n  estoque      INT          DEFAULT 0,\n  ativo        TINYINT(1)   DEFAULT 1,\n  PRIMARY KEY (id_produto),\n  FOREIGN KEY (id_categoria)\n    REFERENCES categoria(id_categoria)\n    ON DELETE RESTRICT\n);</pre></div>","<div class=\"hl\"><strong>NOT NULL</strong> — o campo é obrigatório. <strong>DEFAULT</strong> — valor padrão quando não informado. <strong>AUTO_INCREMENT</strong> — o banco gera o próximo número automaticamente.</div>"].join('');},
function(){return ["<div class=\"ey\">Ordem de criação &middot; 3 min</div>","<div class=\"stitle\">Por que a ordem das tabelas importa</div>","<div class=\"ssub\">FOREIGN KEY referencia uma tabela que precisa existir antes. Se produto tentar referenciar categoria que ainda não existe, o banco rejeita o CREATE TABLE.</div>","<div class=\"rl\">","<div class=\"ri\"><div class=\"rn\">1</div><div class=\"rt\"><strong>Tabelas pai primeiro:</strong> categoria, departamento, cliente — não têm FK.</div></div>","<div class=\"ri\"><div class=\"rn\">2</div><div class=\"rt\"><strong>Tabelas filho depois:</strong> produto (FK para categoria), funcionario (FK para departamento).</div></div>","<div class=\"ri\"><div class=\"rn\">3</div><div class=\"rt\"><strong>INSERT na mesma ordem:</strong> insira os dados das tabelas pai antes das tabelas filho.</div></div>","<div class=\"ri\"><div class=\"rn\">4</div><div class=\"rt\"><strong>DELETE na ordem inversa:</strong> delete filhos antes dos pais. ON DELETE RESTRICT protege automaticamente.</div></div>","</div>"].join('');},
function(){return ["<div class=\"ey\">INSERT &middot; 4 min</div>","<div class=\"stitle\">Inserindo dados na ordem correta</div>","<div class=\"cw\"><div class=\"ch\"><span>SQL &middot; INSERT INTO</span><div class=\"cd\"><div class=\"c1\" style=\"background:#ef4444\"></div><div class=\"c1\" style=\"background:#f59e0b\"></div><div class=\"c1\" style=\"background:#10b981\"></div></div></div>","<pre>-- 1. Tabela pai primeiro\nINSERT INTO categoria (nome) VALUES\n  ('Roupas'), ('Calcados');\n\n-- 2. Tabela filho depois (id_categoria 1 e 2 já existem)\nINSERT INTO produto (id_categoria, nome, preco, estoque) VALUES\n  (1, 'Camiseta Azul', 49.90, 100),\n  (1, 'Calca Jeans', 129.90, 45),\n  (2, 'Tenis Branco', 219.90, 30);</pre></div>","<div class=\"hl\"><strong>Tente inserir com id_categoria = 99</strong> (inexistente) — Error 1452: Cannot add or update a child row: a foreign key constraint fails.</div>"].join('');},
function(){return ["<div class=\"ey\">EER &middot; 3 min</div>","<div class=\"stitle\">Reverse Engineer — do SQL de volta ao diagrama</div>","<div class=\"ssub\">O Workbench consegue ler um banco existente e gerar o diagrama EER automaticamente. É a forma de confirmar que a implementação bate com o modelo.</div>","<div class=\"rl\">","<div class=\"ri\"><div class=\"rn\">1</div><div class=\"rt\"><strong>Database &rarr; Reverse Engineer</strong> no menu do Workbench.</div></div>","<div class=\"ri\"><div class=\"rn\">2</div><div class=\"rt\"><strong>Selecione a conexão</strong> e o banco loja &rarr; avance.</div></div>","<div class=\"ri\"><div class=\"rn\">3</div><div class=\"rt\"><strong>O diagrama EER</strong> aparece com as tabelas e as linhas de FK.</div></div>","<div class=\"ri\"><div class=\"rn\">4</div><div class=\"rt\"><strong>Compare com o DER</strong> desenhado na Aula 02 — devem ser equivalentes.</div></div>","</div>","<div class=\"hl\"><strong>Diferença DER vs EER:</strong> DER é conceitual (entidades e relacionamentos). EER é físico (tabelas, colunas, tipos, FKs). O Workbench gera o EER, não o DER.</div>"].join('');},
function(){return ["<div class=\"ey\">Quiz &middot; 3 min</div>","<div class=\"stitle\">Verifica&#231;&#227;o de aprendizagem</div>","<div class=\"qb\"><div class=\"qa\">1. Por que criamos a tabela categoria antes de produto?</div>","<div class=\"qo\">","<div class=\"qop\" onclick=\"ansQ(this,'w','f0')\"><span>A</span>Por convenção — não é obrigatório</div>","<div class=\"qop\" onclick=\"ansQ(this,'c','f0')\"><span>B</span>Porque produto tem FOREIGN KEY que referencia categoria — ela precisa existir antes</div>","<div class=\"qop\" onclick=\"ansQ(this,'w','f0')\"><span>C</span>Porque categoria tem mais colunas</div>","</div><div class=\"qfb\" id=\"f0\" style=\"background:#f0fdf4;color:#15803d\">Correto! A FK em produto referencia a PK de categoria. Se categoria não existir ainda, o banco rejeita o CREATE TABLE de produto.</div></div>","<div class=\"qb\"><div class=\"qa\">2. O que ON DELETE RESTRICT faz?</div>","<div class=\"qo\">","<div class=\"qop\" onclick=\"ansQ(this,'w','f1')\"><span>A</span>Deleta automaticamente os produtos quando a categoria é deletada</div>","<div class=\"qop\" onclick=\"ansQ(this,'w','f1')\"><span>B</span>Não faz nada — é opcional</div>","<div class=\"qop\" onclick=\"ansQ(this,'c','f1')\"><span>C</span>Impede deletar uma categoria que ainda tem produtos vinculados</div>","</div><div class=\"qfb\" id=\"f1\" style=\"background:#f0fdf4;color:#15803d\">Correto! RESTRICT protege a integridade referencial. Para deletar seria necessário remover os produtos primeiro. ON DELETE CASCADE deletaria os produtos automaticamente — use com cuidado.</div></div>"].join('');},
function(){return ["<div class=\"ey\">Recapitula&#231;&#227;o &middot; 2 min</div>","<div class=\"stitle\">Recapitulando</div>","<div class=\"rl\">","<div class=\"ri\"><div class=\"rn\">1</div><div class=\"rt\"><strong>Mapeamento DER &rarr; SQL.</strong> Entidade &rarr; tabela. Atributo &rarr; coluna. Relacionamento &rarr; FK.</div></div>","<div class=\"ri\"><div class=\"rn\">2</div><div class=\"rt\"><strong>Tipos de dados.</strong> INT para inteiros, DECIMAL(10,2) para dinheiro, VARCHAR para texto, TINYINT(1) para boolean.</div></div>","<div class=\"ri\"><div class=\"rn\">3</div><div class=\"rt\"><strong>Ordem de criação.</strong> Tabelas pai antes das tabelas filho. INSERT na mesma ordem. DELETE na ordem inversa.</div></div>","<div class=\"ri\"><div class=\"rn\">4</div><div class=\"rt\"><strong>FOREIGN KEY.</strong> Liga produto a categoria. ON DELETE RESTRICT protege a integridade.</div></div>","<div class=\"ri\"><div class=\"rn\">5</div><div class=\"rt\"><strong>EER.</strong> Reverse Engineer gera o diagrama físico a partir do banco existente.</div></div>","</div>","<div class=\"hl\"><strong>Próximo passo:</strong> demo ao vivo — criar o banco loja do zero no Workbench.</div>"].join('');}
];

function ansQ(el,t,id){
  var qb=el.closest('.qb');
  qb.querySelectorAll('.qop').forEach(function(o){
    if(o===el) o.classList.add(t==='c'?'correct':'wrong');
    else o.classList.add('dimmed');
  });
  var fb=document.getElementById(id);
  if(t!=='c'){fb.style.background='#fef2f2';fb.style.color='#dc2626';fb.textContent='N\u00e3o exatamente \u2014 relembre o conte\u00fado do slide.';}
  fb.style.display='block';
}
function buildDots(){
  var bar=document.getElementById('dots-bar');
  bar.innerHTML='';
  for(var i=0;i<SLIDES.length;i++){
    var d=document.createElement('span');
    d.className='dot'+(i===0?' active':'');
    d.onclick=(function(idx){return function(){goTo(idx);};})(i);
    bar.appendChild(d);
    if(i<SLIDES.length-1){var sep=document.createElement('div');sep.className='dsep';bar.appendChild(sep);}
  }
}
function buildSlides(){
  var area=document.getElementById('slide-area');
  area.innerHTML='';
  for(var i=0;i<SLIDES.length;i++){
    var div=document.createElement('div');
    div.className='slide'+(i===0?' active':'');
    div.id='slide-'+i;
    div.innerHTML=SLIDES[i]();
    area.appendChild(div);
  }
}
function goTo(i){
  document.getElementById('slide-'+cur).classList.remove('active');
  var dots=document.querySelectorAll('.dot');
  dots[cur].classList.remove('active');
  if(i>cur) dots[cur].classList.add('done');
  cur=i;
  var el=document.getElementById('slide-'+cur);
  el.innerHTML=SLIDES[cur]();
  el.classList.add('active');
  dots[cur].classList.add('active');
  dots[cur].classList.remove('done');
  document.getElementById('slide-area').scrollTop=0;
  document.getElementById('btn-prev').disabled=(cur===0);
  var bn=document.getElementById('btn-next');
  bn.disabled=(cur===SLIDES.length-1);
  bn.textContent=(cur===SLIDES.length-1)?'Finalizar':'Pr\u00f3ximo \u2192';
  document.getElementById('counter').textContent=(cur+1)+' / '+SLIDES.length;
  if(!timerStarted){timerStarted=true;startTimer();}
}
function goNav(dir){var ni=cur+dir;if(ni>=0&&ni<SLIDES.length)goTo(ni);}
function startTimer(){
  var rem=45*60;
  var el=document.getElementById('timer');
  timerInterval=setInterval(function(){
    rem--;
    var m=Math.floor(rem/60),s=rem%60;
    el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
    if(rem<=300) el.className='timer warn';
    if(rem<=60)  el.className='timer danger';
    if(rem<=0){clearInterval(timerInterval);el.textContent='00:00';}
  },1000);
}
var cur=0,timerStarted=false,timerInterval=null;
buildDots();buildSlides();document.getElementById('btn-prev').disabled=true;

</script>
</body></html>
