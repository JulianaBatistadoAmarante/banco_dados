<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Demo &mdash; Agregação MongoDB e Projeto &middot; Aula 07</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;min-height:100vh}
.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}
.full{grid-column:1/-1}
.page-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.page-hdr h1{font-size:16px;font-weight:600}.page-hdr p{font-size:12px;color:#94a3b8}
.prog-track{height:3px;background:#e2e8f0;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#1565C0;border-radius:2px;transition:width .3s}
.panel{border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;background:#fff}
.ph{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-bottom:1px solid #e2e8f0;background:#f8fafc;font-size:12px;font-weight:500;color:#64748b}
.cd{display:flex;gap:5px}.c1{width:10px;height:10px;border-radius:50%}
.editor{background:#1e293b;min-height:300px;padding:15px;font-family:'Courier New',monospace;font-size:12px;line-height:1.8;overflow:hidden}
#code-out{white-space:pre-wrap;word-break:break-all;color:#94a3b8}
.cursor{display:inline-block;width:2px;height:14px;background:#60a5fa;vertical-align:middle;animation:blink .9s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.preview{min-height:300px;padding:15px;overflow-y:auto;background:#fff;font-size:13px}
.narr{background:#e3f2fd;border:1px solid #bbdefb;border-radius:10px;padding:11px 14px;font-size:13px;color:#0d3c6e;line-height:1.6}
.narr strong{color:#1565C0}
.step-bar{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:11px 14px;flex-wrap:wrap}
.sbadge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:#bbdefb;color:#1565C0}
.slabel{font-size:12px;color:#64748b;flex:1}
.cb2{font-size:12px;font-weight:500;padding:6px 13px;border-radius:7px;border:1px solid #cbd5e1;background:#fff;color:#1e293b;cursor:pointer;font-family:inherit;transition:all .15s}
.cb2:hover{background:#f1f5f9}.cb2.go{background:#1565C0;color:#fff;border-color:#1565C0}
.cb2:disabled{opacity:.35;pointer-events:none}
.hl{background:#e3f2fd;border-left:3px solid #1565C0;padding:9px 12px;font-size:12px;color:#0d3c6e;border-radius:0 6px 6px 0;margin:8px 0}
.rtbl{width:100%;border-collapse:collapse;font-size:12px}
.rtbl thead tr th{background:#1565C0;color:#fff;padding:6px 9px;text-align:left}
.rtbl tbody tr td{padding:6px 9px;border-bottom:1px solid #e2e8f0;color:#475569}
.rtbl tbody tr:nth-child(even){background:#f8fafc}
@media(max-width:680px){.wrap{grid-template-columns:1fr}}
.kz-footer{height:32px;background:#1e293b;display:flex;align-items:center;justify-content:center;gap:10px}
.kz-footer a{color:#90caf9;font-size:11px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:5px}
.kz-footer a:hover{color:#bbdefb}.kz-footer span{color:#475569;font-size:11px}
.next-stage{font-size:12px;font-weight:600;background:#fff;border:1.5px solid #1565C0;color:#1565C0;padding:5px 13px;border-radius:8px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.next-stage:hover{background:#e3f2fd}
</style>
</head>
<body>
<div class="wrap">
  <div class="full page-hdr">
    <h1>Demo ao Vivo &mdash; Agregação MongoDB e Projeto</h1>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <p>Aula 07 &middot; 30 min</p>
      <button class="next-stage" onclick="window.location.href='a07_pratica_guiada.html'">&#128221; Pr&#225;tica &rarr;</button>
    </div>
  </div>
  <div class="full prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="panel">
    <div class="ph"><span>Editor SQL / MongoDB Shell</span>
    <div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div>
    <div class="editor"><span id="code-out"></span><span class="cursor"></span></div>
  </div>
  <div class="panel">
    <div class="ph"><span>Resultado esperado</span>
    <div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div>
    <div class="preview" id="preview"></div>
  </div>
  <div class="full narr" id="narr">Pronto. Clique em <strong>&#9654; Iniciar digita&#231;&#227;o</strong> para come&#231;ar.</div>
  <div class="full step-bar">
    <span class="sbadge" id="sbadge">Etapa 1 / 6</span>
    <span class="slabel" id="sdesc"></span>
    <button class="cb2" id="bp" onclick="prevS()" disabled>&#8592; Anterior</button>
    <button class="cb2 go" id="bplay" onclick="playS()">&#9654; Iniciar digita&#231;&#227;o</button>
    <button class="cb2" id="bn" onclick="nextS()" disabled>Pr&#243;xima &#8594;</button>
  </div>
</div>
<div class="kz-footer"><a href="https://instagram.com/karizeviecelli" target="_blank" rel="noopener"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>@karizeviecelli</a><span>·</span><span>© 2026</span></div>
<script>
var STEPS=[{"label": "aggregate() — $match + $group", "narr": "<strong>Docente:</strong> O pipeline processa documentos em sequência. $match filtra, $group agrupa — equivalente ao WHERE + GROUP BY do SQL.", "code": "db.produtos.aggregate([\n  { $match: { preco: { $gt: 40 } } },\n  { $group: {\n      _id: \"$categoria.nome\",\n      total:   { $sum: 1 },\n      media:   { $avg: \"$preco\" },\n      estoque: { $sum: \"$estoque\" }\n  } },\n  { $sort: { media: -1 } }\n])", "prev": "<table class='rtbl'><thead><tr><th>_id</th><th>total</th><th>media</th><th>estoque</th></tr></thead><tbody><tr><td>Calcados</td><td>1</td><td>219.90</td><td>30</td></tr><tr><td>Roupas</td><td>2</td><td>92.40</td><td>145</td></tr></tbody></table>"}, {"label": "$addFields + $project", "narr": "<strong>Docente:</strong> $addFields cria campo calculado. $project seleciona os campos do resultado — 1 incluir, 0 excluir.", "code": "db.produtos.aggregate([\n  { $addFields: {\n      valor_item: { $multiply: [\"$preco\",\"$estoque\"] }\n  } },\n  { $project: {\n      nome:1, preco:1, valor_item:1, _id:0\n  } },\n  { $sort: { valor_item: -1 } }\n])", "prev": "<table class='rtbl'><thead><tr><th>nome</th><th>preco</th><th>valor_item</th></tr></thead><tbody><tr><td>Camiseta Azul</td><td>54.90</td><td>5490.00</td></tr><tr><td>Calca Jeans</td><td>129.90</td><td>5845.50</td></tr><tr><td>Tenis Branco</td><td>219.90</td><td>6597.00</td></tr></tbody></table>"}, {"label": "Comparativo lado a lado", "narr": "<strong>Docente:</strong> A mesma pergunta respondida nos dois bancos. Resultado idêntico, sintaxe diferente.", "code": "-- MySQL\nSELECT c.nome, COUNT(*), AVG(p.preco)\nFROM produto p\nINNER JOIN categoria c\n  ON p.id_categoria = c.id_categoria\nGROUP BY c.nome;\n\n// MongoDB\ndb.produtos.aggregate([\n  { $group: {\n      _id: \"$categoria.nome\",\n      total: { $sum: 1 },\n      media: { $avg: \"$preco\" }\n  } }\n])", "prev": "<div class='hl'><strong>Resultado idêntico.</strong> MySQL precisou de INNER JOIN. MongoDB não — embedding eliminou a necessidade. O tradeoff: MongoDB duplica os dados de categoria em cada produto.</div>"}, {"label": "Critérios de decisão — casos práticos", "narr": "<strong>Docente:</strong> Para cada caso a turma decide: MySQL ou MongoDB?", "code": "/* CASOS PARA DISCUSSÃO\n\n1. Sistema bancário com transferências\n   → MySQL: ACID crítico\n\n2. Catálogo de produtos com atributos\n   variáveis por tipo de produto\n   → MongoDB: schema flexível\n\n3. Log de eventos de servidor\n   (milhões de registros por dia)\n   → MongoDB: volume, escrita rápida\n\n4. ERP com múltiplos departamentos\n   e relatórios gerenciais\n   → MySQL: relacional, JOINs, relatórios\n*/", "prev": "<div style='display:flex;flex-direction:column;gap:8px'><div style='background:#e3f2fd;border-radius:7px;padding:9px 12px;font-size:12px;color:#0d3c6e'><strong>MySQL:</strong> Sistema bancário ✓ · ERP ✓ · Schema estável ✓</div><div style='background:#f0fdf4;border-radius:7px;padding:9px 12px;font-size:12px;color:#166534'><strong>MongoDB:</strong> Catálogo variável ✓ · Logs ✓ · IoT ✓</div></div>"}, {"label": "Projeto integrador — SQL de referência", "narr": "<strong>Docente:</strong> Template de referência para o projeto. Tabelas pai criadas antes das tabelas filho.", "code": "CREATE DATABASE projeto_final;\nUSE projeto_final;\n\nCREATE TABLE departamento (\n  id   INT AUTO_INCREMENT PRIMARY KEY,\n  nome VARCHAR(80) NOT NULL\n);\n\nCREATE TABLE funcionario (\n  id       INT AUTO_INCREMENT PRIMARY KEY,\n  id_depto INT NOT NULL,\n  nome     VARCHAR(120) NOT NULL,\n  salario  DECIMAL(10,2),\n  FOREIGN KEY (id_depto)\n    REFERENCES departamento(id)\n);", "prev": "<div class='hl'><strong>Ordem obrigatória:</strong> departamento (pai) antes de funcionario (filho). A FK de funcionario só funciona se departamento já existir.</div>"}, {"label": "Roteiro da apresentação oral", "narr": "<strong>Docente:</strong> Cada aluno tem 5 minutos. Abram tudo antes de começar — draw.io, Workbench e Compass.", "code": "/* ROTEIRO (5 minutos)\n\n1. CONTEXTO (30s)\n   Qual sistema você modelou?\n\n2. DER (1 min)\n   Mostre o diagrama — explique\n   entidades e FKs\n\n3. SQL AO VIVO (1 min)\n   Execute um SELECT com INNER JOIN\n\n4. MONGODB (1 min)\n   Mostre find() ou aggregate()\n\n5. COMPARATIVO (1 min)\n   MySQL ou MongoDB para esse caso?\n   Por quê?\n*/", "prev": "<div class='hl'><strong>Dica:</strong> Tenha screenshots de backup caso a conexão caia. Nada pior que esperar carregamento durante 5 minutos de apresentação.</div>"}];

let cur=0,typing=false,typeTimer=null;
function render(){
  var s=STEPS[cur];
  document.getElementById('sbadge').textContent='Etapa '+(cur+1)+' / '+STEPS.length;
  document.getElementById('sdesc').textContent=s.label;
  document.getElementById('prog-fill').style.width=Math.round(((cur+1)/STEPS.length)*100)+'%';
  document.getElementById('bp').disabled=(cur===0);
  document.getElementById('bn').disabled=(cur===STEPS.length-1);
  document.getElementById('narr').innerHTML=s.narr;
  document.getElementById('preview').innerHTML=s.prev||'';
}
function playS(){
  if(typing)return;
  typing=true;
  var s=STEPS[cur];
  var out=document.getElementById('code-out');
  out.innerHTML='';
  document.getElementById('bplay').disabled=true;
  document.getElementById('bp').disabled=true;
  document.getElementById('bn').disabled=true;
  var full=s.code;
  var parts=[];
  var i=0;
  while(i<full.length){
    if(full[i]==='<'){
      var end=full.indexOf('>',i);
      if(end!==-1){parts.push({type:'tag',val:full.slice(i,end+1)});i=end+1;continue;}
    }
    parts.push({type:'char',val:full[i]});i++;
  }
  var pi=0;
  function tick(){
    if(pi>=parts.length){
      typing=false;
      document.getElementById('bplay').textContent='Rever';
      document.getElementById('bplay').disabled=false;
      document.getElementById('bn').disabled=(cur===STEPS.length-1);
      document.getElementById('bp').disabled=false;
      return;
    }
    var p=parts[pi];
    if(p.type==='tag'){out.innerHTML+=p.val;pi++;tick();return;}
    out.innerHTML+=p.val;pi++;
    typeTimer=setTimeout(tick,p.val==='\n'?55:p.val===' '?18:Math.random()*20+16);
  }
  tick();
}
function nextS(){
  if(typing){clearTimeout(typeTimer);typing=false;}
  cur=Math.min(cur+1,STEPS.length-1);
  render();
  document.getElementById('code-out').innerHTML=STEPS[cur].code;
  document.getElementById('bplay').textContent='Rever';
  document.getElementById('bplay').disabled=false;
}
function prevS(){
  if(typing){clearTimeout(typeTimer);typing=false;}
  cur=Math.max(cur-1,0);
  render();
  document.getElementById('code-out').innerHTML=STEPS[cur].code;
  document.getElementById('bplay').textContent='Rever';
  document.getElementById('bplay').disabled=false;
}
render();
document.getElementById('code-out').innerHTML='';

</script>
</body></html>
