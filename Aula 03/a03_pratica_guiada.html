<script>const STEPS=[
{title:"Criar o banco e as primeiras tabelas",time:"15 min",
instrs:[
  "Abra o MySQL Workbench e conecte ao servidor local",
  "Execute: <code>CREATE DATABASE loja; USE loja;</code>",
  "Crie a tabela <strong>categoria</strong> primeiro — ela não depende de ninguém",
  "Verifique no painel esquerdo (Schemas) que o banco loja apareceu"
],
code:`CREATE DATABASE IF NOT EXISTS loja;\nUSE loja;\n\nCREATE TABLE categoria (\n  id_categoria INT AUTO_INCREMENT,\n  nome         VARCHAR(80)  NOT NULL,\n  descricao    VARCHAR(200),\n  PRIMARY KEY (id_categoria)\n);`,
tip:"<strong>Ordem importa:</strong> sempre crie as tabelas pai (sem FK) antes das tabelas filho. categoria não tem FK, por isso vem primeiro."},
{title:"Criar tabela produto com FOREIGN KEY",time:"15 min",
instrs:[
  "Crie a tabela produto referenciando categoria",
  "Observe a declaração de FOREIGN KEY no final do CREATE TABLE",
  "Execute e verifique que não dá erro — categoria já existe",
  "Tente inverter a ordem (produto antes de categoria) — o que acontece?"
],
code:`CREATE TABLE produto (\n  id_produto   INT AUTO_INCREMENT,\n  id_categoria INT          NOT NULL,\n  nome         VARCHAR(100) NOT NULL,\n  preco        DECIMAL(10,2) NOT NULL,\n  estoque      INT          DEFAULT 0,\n  ativo        TINYINT(1)   DEFAULT 1,\n  PRIMARY KEY (id_produto),\n  FOREIGN KEY (id_categoria)\n    REFERENCES categoria(id_categoria)\n    ON DELETE RESTRICT\n);`,
tip:"<strong>ON DELETE RESTRICT</strong> impede deletar uma categoria que tem produtos vinculados. É a proteção da integridade referencial — o banco recusa a operação em vez de criar um produto 'órfão'."},
{title:"Criar tabela cliente e INSERT nas três tabelas",time:"20 min",
instrs:[
  "Crie a tabela cliente (independente, sem FK)",
  "Execute os INSERTs na ordem correta: categoria → produto → cliente",
  "Tente inserir um produto com id_categoria inexistente — o que acontece?",
  "Execute SELECT * em cada tabela para confirmar os dados"
],
code:`CREATE TABLE cliente (\n  id_cliente INT AUTO_INCREMENT,\n  nome       VARCHAR(120) NOT NULL,\n  email      VARCHAR(120) NOT NULL UNIQUE,\n  telefone   VARCHAR(20),\n  PRIMARY KEY (id_cliente)\n);\n\nINSERT INTO categoria (nome) VALUES\n  ('Roupas'), ('Calcados'), ('Acessorios');\n\nINSERT INTO produto (id_categoria,nome,preco,estoque) VALUES\n  (1,'Camiseta Azul',49.90,100),\n  (1,'Calca Jeans',129.90,45),\n  (2,'Tenis Branco',219.90,30);\n\nINSERT INTO cliente (nome,email) VALUES\n  ('Ana Silva','ana@email.com'),\n  ('Bruno Costa','bruno@email.com');`,
tip:"<strong>UNIQUE no email</strong> garante que dois clientes não podem ter o mesmo e-mail. Tente inserir o mesmo e-mail duas vezes — Error 1062: Duplicate entry."},
{title:"SELECT básico — consultar os dados",time:"15 min",
instrs:[
  "Execute SELECT * FROM produto e observe todas as colunas",
  "Adicione WHERE preco > 50 e veja o filtro funcionando",
  "Use ORDER BY preco DESC para ordenar do mais caro ao mais barato",
  "Combine: <code>WHERE ativo = 1 ORDER BY nome ASC LIMIT 2</code>"
],
code:`-- Todos os produtos\nSELECT * FROM produto;\n\n-- Filtrar por preco\nSELECT nome, preco, estoque\nFROM produto\nWHERE preco > 50\nORDER BY preco DESC;\n\n-- LIMIT: só os 2 primeiros\nSELECT nome, preco\nFROM produto\nORDER BY preco ASC\nLIMIT 2;`,
tip:"<strong>SELECT * em produção</strong> é má prática — traz colunas desnecessárias e fica mais lento com tabelas grandes. Prefira listar as colunas explicitamente: SELECT nome, preco FROM produto."},
{title:"EER via Reverse Engineer",time:"15 min",
instrs:[
  "No Workbench: menu Database → Reverse Engineer",
  "Siga o assistente: selecione a conexão → selecione o banco loja → avance",
  "O diagrama EER aparece com as 3 tabelas e a FK entre produto e categoria",
  "Compare com o DER que você desenhou na Aula 02 — estão iguais?"
],
code:`-- Verificar as FKs criadas no banco\nSELECT\n  TABLE_NAME    AS tabela,\n  COLUMN_NAME   AS coluna_fk,\n  REFERENCED_TABLE_NAME  AS referencia\nFROM INFORMATION_SCHEMA.KEY_COLUMN_USAGE\nWHERE TABLE_SCHEMA = 'loja'\n  AND REFERENCED_TABLE_NAME IS NOT NULL;`,
tip:"<strong>Reverse Engineer</strong> lê a estrutura do banco e desenha o EER automaticamente. É a forma mais rápida de documentar um banco existente e confirmar que a implementação bate com o modelo."},
{title:"ALTER TABLE — evoluir a estrutura",time:"10 min",
instrs:[
  "Adicione a coluna data_cadastro à tabela produto",
  "Adicione a coluna cidade à tabela cliente",
  "Verifique com DESCRIBE produto que as novas colunas aparecem",
  "Re-execute o Reverse Engineer — o EER atualiza automaticamente"
],
code:`-- Adicionar coluna\nALTER TABLE produto\n  ADD COLUMN data_cadastro DATE DEFAULT (CURRENT_DATE);\n\nALTER TABLE cliente\n  ADD COLUMN cidade VARCHAR(80);\n\n-- Ver estrutura atualizada\nDESCRIBE produto;\nDESCRIBE cliente;`,
tip:"<strong>ALTER TABLE</strong> modifica uma tabela existente sem perder os dados. Em produção, alterações em tabelas grandes podem ser lentas — sempre faça em horário de baixo tráfego e com backup prévio."}
];</script>
<script>
let done=new Set();
function build(){
  const list=document.getElementById('steps');
  STEPS.forEach((s,i)=>{
    const card=document.createElement('div');
    card.className='sc'+(i===0?' open-c':'');
    card.id='sc-'+i;
    let gab='';
    if(s.code){
      gab=`<div class="gab-wrap">
        <button class="gab-btn" id="gbtn-${i}" onclick="togGab(${i})">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Ver gabarito <span class="arr">&#9662;</span>
        </button>
        <div class="gab-body" id="gab-${i}">
          <div class="cw" style="margin-top:7px">
            <div class="ch2"><span>Gabarito</span><div class="cdd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div>
            <pre>${s.code}</pre>
          </div>
        </div>
      </div>`;
    }
    card.innerHTML=`<div class="sh" onclick="tog(${i})">
      <div class="chk" id="chk-${i}" onclick="event.stopPropagation();mk(${i})">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="si"><div class="sn2">Passo ${i+1} de ${STEPS.length}</div><div class="st">${s.title}</div><div class="stm">${s.time}</div></div>
      <span class="cv">${i===0?'&#9650;':'&#9660;'}</span>
    </div>
    <div class="sb"><div class="sbi">
      <div class="il">${s.instrs.map((t,j)=>`<div class="ii"><div class="in">${j+1}</div><span>${t}</span></div>`).join('')}</div>
      ${gab}
      <div class="tip">${s.tip}</div>
      <button class="mb" id="mb-${i}" onclick="mk(${i})">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Marcar como conclui&#769;do
      </button>
    </div></div>`;
    list.appendChild(card);
  });
}
function togGab(i){
  document.getElementById('gbtn-'+i).classList.toggle('open');
  document.getElementById('gab-'+i).classList.toggle('open');
}
function tog(i){
  const c=document.getElementById('sc-'+i);
  const o=c.classList.contains('open-c');
  document.querySelectorAll('.sc').forEach(x=>{x.classList.remove('open-c');x.querySelector('.cv').innerHTML='&#9660;';});
  if(!o){c.classList.add('open-c');c.querySelector('.cv').innerHTML='&#9650;';}
}
function mk(i){
  if(done.has(i))return;
  done.add(i);
  document.getElementById('chk-'+i).classList.add('done');
  document.getElementById('sc-'+i).classList.add('done-c');
  const mb=document.getElementById('mb-'+i);
  mb.classList.add('done-btn');
  mb.innerHTML='<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Conclu&#237;do!';
  upd();
  if(i<STEPS.length-1){
    document.querySelectorAll('.sc').forEach(x=>{x.classList.remove('open-c');x.querySelector('.cv').innerHTML='&#9660;';});
    const nx=document.getElementById('sc-'+(i+1));
    nx.classList.add('open-c');nx.querySelector('.cv').innerHTML='&#9650;';
    setTimeout(()=>nx.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
  }
  if(done.size===STEPS.length)document.getElementById('success-el').classList.add('show');
}
function upd(){
  document.getElementById('pf').style.width=Math.round((done.size/STEPS.length)*100)+'%';
  document.getElementById('pt').textContent=done.size+' / '+STEPS.length;
}
build();upd();
</script>
</body></html>
