<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Exposi&#231;&#227;o &mdash; SELECT avançado e INNER JOIN &middot; Aula 04</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;gap:8px;flex-wrap:wrap;min-height:52px}
.badge{background:#15803d;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-title{font-size:14px;font-weight:600}.hdr-sub{font-size:12px;color:#94a3b8;margin-top:1px}
.timer{font-size:13px;font-weight:500;background:#f1f5f9;padding:5px 14px;border-radius:8px;border:1px solid #e2e8f0;font-family:monospace;color:#475569;min-width:64px;text-align:center}
.timer.warn{color:#d97706;background:#fffbeb}.timer.danger{color:#dc2626;background:#fef2f2}
.dots{display:flex;align-items:center;gap:5px;padding:9px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;overflow-x:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:#15803d;transform:scale(1.4)}.dot.done{background:#15803d;opacity:.4}
.dsep{width:10px;height:1px;background:#e2e8f0;flex-shrink:0}
.slide-area{flex:1;overflow-y:auto;padding:22px 28px}
.slide{display:none}.slide.active{display:block;animation:sIn .22s ease}
@keyframes sIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ey{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#15803d;margin-bottom:5px}
.stitle{font-size:21px;font-weight:600;color:#1e293b;line-height:1.2;margin-bottom:5px}
.ssub{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px}
.card.ac{border-left:3px solid #15803d}
.ci{font-size:18px;margin-bottom:5px}.ct{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.cb{font-size:12px;color:#64748b;line-height:1.5}
.cw{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin:10px 0}
.ch{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:7px 13px;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:500;color:#64748b}
.cd{display:flex;gap:5px}.c1{width:10px;height:10px;border-radius:50%}
pre{background:#1e293b;color:#e2e8f0;padding:13px 16px;font-size:12px;line-height:1.8;overflow-x:auto;font-family:monospace;white-space:pre;margin:0}
.hl{background:#f0fdf4;border-left:3px solid #15803d;padding:10px 13px;font-size:12.5px;color:#14532d;line-height:1.55;margin:10px 0}
.hl strong{color:#15803d}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:560px){.two-col{grid-template-columns:1fr}}
.qb{margin-bottom:16px}.qa{font-size:13.5px;font-weight:600;color:#1e293b;margin-bottom:11px;line-height:1.5}
.qo{display:flex;flex-direction:column;gap:7px}
.qop{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:9px;transition:all .15s;color:#1e293b}
.qop:hover:not(.correct):not(.wrong):not(.dimmed){border-color:#15803d;background:#f0fdf4}
.qop.correct{background:#f0fdf4;border-color:#86efac;color:#15803d;pointer-events:none}
.qop.wrong{background:#fef2f2;border-color:#fca5a5;color:#dc2626;pointer-events:none}
.qop.dimmed{opacity:.4;pointer-events:none}
.qfb{margin-top:9px;padding:9px 13px;border-radius:8px;font-size:12.5px;line-height:1.5;display:none}
.rl{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ri{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px}
.rn{width:23px;height:23px;min-width:23px;border-radius:6px;background:#86efac;color:#15803d;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rt{font-size:13px;color:#64748b;line-height:1.55}.rt strong{color:#1e293b;font-weight:600}
.comp-table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0}
.comp-table thead tr th{background:#15803d;color:#fff;padding:7px 10px;text-align:left;font-weight:600}
.comp-table tbody tr td{padding:7px 10px;border-bottom:1px solid #e2e8f0;color:#475569;vertical-align:top}
.comp-table tbody tr:nth-child(even){background:#f8fafc}
.rtbl{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.rtbl thead tr th{background:#15803d;color:#fff;padding:6px 10px;text-align:left}
.rtbl tbody tr td{padding:6px 10px;border-bottom:1px solid #e2e8f0;color:#475569}
.rtbl tbody tr:nth-child(even){background:#f8fafc}
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.nb{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:7px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:#e2e8f0}.nb.pr{background:#15803d;color:#fff;border-color:#15803d}
.nb:disabled{opacity:.35;pointer-events:none}.nc{font-size:12px;color:#94a3b8}
.kz-footer{height:32px;background:#1e293b;display:flex;align-items:center;justify-content:center;gap:10px;flex-shrink:0}
.kz-footer a{color:#90caf9;font-size:11px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:5px}
.kz-footer a:hover{color:#bbdefb}.kz-footer span{color:#475569;font-size:11px}
.next-stage{font-size:12px;font-weight:600;background:#fff;border:1.5px solid #15803d;color:#15803d;padding:5px 13px;border-radius:8px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.next-stage:hover{background:#f0fdf4}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:11px">
      <span class="badge">Aula 04</span>
      <div><div class="hdr-title">SELECT avançado e INNER JOIN &mdash; Exposi&#231;&#227;o Dialogada</div>
      <div class="hdr-sub">45 minutos &middot; Projetor &middot; Turma</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
      <div class="timer" id="timer">45:00</div>
      <button class="next-stage" onclick="window.location.href='a04_demo_ao_vivo.html'">&#128187; Demo &rarr;</button>
    </div>
  </div>
  <div class="dots" id="dots-bar"></div>
  <div class="slide-area" id="slide-area"></div>
  <div class="nav">
    <button class="nb" id="btn-prev" onclick="goNav(-1)" disabled>&#8592; Anterior</button>
    <span class="nc" id="counter">1 / 8</span>
    <button class="nb pr" id="btn-next" onclick="goNav(1)">Pr&#243;ximo &#8594;</button>
  </div>
  <div class="kz-footer"><a href="https://instagram.com/karizeviecelli" target="_blank" rel="noopener"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>@karizeviecelli</a><span>·</span><span>© 2026</span></div>
</div>
<script>
var SLIDES=[
function(){return ["<div class=\"ey\">Abertura &middot; 3 min</div>","<div class=\"stitle\">SELECT * traz id_categoria = 1 — e o nome da categoria?</div>","<div class=\"ssub\">Temos o banco criado, os dados inseridos. Mas quando fazemos SELECT * FROM produto, vemos id_categoria = 1. O número 1 não diz nada. Precisamos do nome. É para isso que existe o JOIN.</div>","<div class=\"cards\">","<div class=\"card ac\"><div class=\"ci\">&#128279;</div><div class=\"ct\">O problema</div><div class=\"cb\">id_categoria é um número. O nome da categoria está em outra tabela. JOIN une as duas.</div></div>","<div class=\"card ac\"><div class=\"ci\">&#129309;</div><div class=\"ct\">INNER JOIN</div><div class=\"cb\">Retorna só as linhas que têm correspondência nas duas tabelas. É o JOIN mais comum.</div></div>","<div class=\"card\"><div class=\"ci\">&#128250;</div><div class=\"ct\">LEFT JOIN</div><div class=\"cb\">Retorna TODOS da tabela esquerda, mesmo sem correspondência à direita. Útil para encontrar categorias sem produtos.</div></div>","<div class=\"card\"><div class=\"ci\">&#127919;</div><div class=\"ct\">O que veremos</div><div class=\"cb\">INNER JOIN, LEFT JOIN, GROUP BY, COUNT, SUM, AVG, HAVING e a ordem de execução do SQL.</div></div>","</div>"].join('');},
function(){return ["<div class=\"ey\">INNER JOIN &middot; 5 min</div>","<div class=\"stitle\">INNER JOIN — unindo tabelas pela FK</div>","<div class=\"cw\"><div class=\"ch\"><span>SQL &middot; INNER JOIN com alias</span><div class=\"cd\"><div class=\"c1\" style=\"background:#ef4444\"></div><div class=\"c1\" style=\"background:#f59e0b\"></div><div class=\"c1\" style=\"background:#10b981\"></div></div></div>","<pre>SELECT\n  p.nome   AS produto,\n  p.preco,\n  c.nome   AS categoria\nFROM produto p\nINNER JOIN categoria c\n  ON p.id_categoria = c.id_categoria\nORDER BY p.preco DESC;</pre></div>","<table class=\"rtbl\"><thead><tr><th>produto</th><th>preco</th><th>categoria</th></tr></thead><tbody>","<tr><td>T&#234;nis Branco</td><td>219.90</td><td>Cal&#231;ados</td></tr>","<tr><td>Cal&#231;a Jeans</td><td>129.90</td><td>Roupas</td></tr>","<tr><td>Camiseta Azul</td><td>49.90</td><td>Roupas</td></tr>","</tbody></table>","<div class=\"hl\"><strong>Alias (apelido):</strong> FROM produto p &mdash; \"p\" é atalho para produto. Obrigatório quando duas tabelas têm colunas com o mesmo nome (nome, id...).</div>"].join('');},
function(){return ["<div class=\"ey\">LEFT JOIN &middot; 4 min</div>","<div class=\"stitle\">LEFT JOIN — todas as categorias, mesmo as sem produtos</div>","<div class=\"cw\"><div class=\"ch\"><span>SQL &middot; LEFT JOIN</span><div class=\"cd\"><div class=\"c1\" style=\"background:#ef4444\"></div><div class=\"c1\" style=\"background:#f59e0b\"></div><div class=\"c1\" style=\"background:#10b981\"></div></div></div>","<pre>-- LEFT JOIN: todas as categorias\nSELECT\n  c.nome   AS categoria,\n  p.nome   AS produto\nFROM categoria c\nLEFT JOIN produto p\n  ON c.id_categoria = p.id_categoria;</pre></div>","<div class=\"hl\"><strong>INNER JOIN</strong> retorna só linhas com correspondência. <strong>LEFT JOIN</strong> retorna todas as linhas da tabela esquerda (categoria), com NULL nas colunas de produto quando não há correspondência. Útil para detectar categorias vazias.</div>"].join('');},
function(){return ["<div class=\"ey\">GROUP BY &middot; 5 min</div>","<div class=\"stitle\">GROUP BY — agrupar para resumir</div>","<div class=\"cw\"><div class=\"ch\"><span>SQL &middot; GROUP BY + COUNT</span><div class=\"cd\"><div class=\"c1\" style=\"background:#ef4444\"></div><div class=\"c1\" style=\"background:#f59e0b\"></div><div class=\"c1\" style=\"background:#10b981\"></div></div></div>","<pre>SELECT\n  c.nome              AS categoria,\n  COUNT(p.id_produto) AS total\nFROM categoria c\nINNER JOIN produto p\n  ON c.id_categoria = p.id_categoria\nGROUP BY c.nome\nORDER BY total DESC;</pre></div>","<div class=\"hl\"><strong>Regra do GROUP BY:</strong> toda coluna no SELECT que não estiver dentro de COUNT/SUM/AVG deve aparecer no GROUP BY. Error 1055 se esquecer.</div>"].join('');},
function(){return ["<div class=\"ey\">Agrega&#231;&#227;o &middot; 4 min</div>","<div class=\"stitle\">COUNT, SUM, AVG, MIN, MAX</div>","<div class=\"cw\"><div class=\"ch\"><span>SQL &middot; fun&#231;&#245;es de agrega&#231;&#227;o</span><div class=\"cd\"><div class=\"c1\" style=\"background:#ef4444\"></div><div class=\"c1\" style=\"background:#f59e0b\"></div><div class=\"c1\" style=\"background:#10b981\"></div></div></div>","<pre>SELECT\n  c.nome,\n  COUNT(p.id_produto)       AS qtd,\n  ROUND(AVG(p.preco), 2)   AS preco_medio,\n  MIN(p.preco)             AS mais_barato,\n  MAX(p.preco)             AS mais_caro,\n  SUM(p.preco * p.estoque) AS valor_estoque\nFROM categoria c\nINNER JOIN produto p\n  ON c.id_categoria = p.id_categoria\nGROUP BY c.nome;</pre></div>"].join('');},
function(){return ["<div class=\"ey\">HAVING &middot; 4 min</div>","<div class=\"stitle\">HAVING — filtrar grupos</div>","<div class=\"cw\"><div class=\"ch\"><span>SQL &middot; WHERE vs HAVING</span><div class=\"cd\"><div class=\"c1\" style=\"background:#ef4444\"></div><div class=\"c1\" style=\"background:#f59e0b\"></div><div class=\"c1\" style=\"background:#10b981\"></div></div></div>","<pre>-- WHERE filtra ANTES do agrupamento\nSELECT c.nome, COUNT(*) AS qtd\nFROM categoria c\nINNER JOIN produto p ON c.id_categoria = p.id_categoria\nWHERE p.preco &gt; 50\nGROUP BY c.nome;\n\n-- HAVING filtra DEPOIS do agrupamento\nSELECT c.nome, COUNT(*) AS qtd\nFROM categoria c\nINNER JOIN produto p ON c.id_categoria = p.id_categoria\nGROUP BY c.nome\nHAVING COUNT(*) &gt;= 2;</pre></div>","<div class=\"hl\"><strong>WHERE COUNT(*) &gt;= 2</strong> &rarr; Error 1111: Invalid use of group function. Funções de agregação só podem ser usadas no SELECT ou no HAVING.</div>"].join('');},
function(){return ["<div class=\"ey\">Quiz &middot; 3 min</div>","<div class=\"stitle\">Verifica&#231;&#227;o de aprendizagem</div>","<div class=\"qb\"><div class=\"qa\">1. Qual cláusula filtra grupos após o GROUP BY?</div>","<div class=\"qo\">","<div class=\"qop\" onclick=\"ansQ(this,'w','f0')\"><span>A</span>WHERE</div>","<div class=\"qop\" onclick=\"ansQ(this,'c','f0')\"><span>B</span>HAVING</div>","<div class=\"qop\" onclick=\"ansQ(this,'w','f0')\"><span>C</span>FILTER</div>","<div class=\"qop\" onclick=\"ansQ(this,'w','f0')\"><span>D</span>ORDER BY</div>","</div><div class=\"qfb\" id=\"f0\" style=\"background:#f0fdf4;color:#15803d\">Correto! HAVING filtra grupos depois do GROUP BY. WHERE filtra linhas antes do GROUP BY.</div></div>","<div class=\"qb\"><div class=\"qa\">2. Uma categoria nova foi inserida mas não tem produtos. Qual JOIN mostra ela no resultado?</div>","<div class=\"qo\">","<div class=\"qop\" onclick=\"ansQ(this,'w','f1')\"><span>A</span>INNER JOIN &mdash; retorna todas as linhas</div>","<div class=\"qop\" onclick=\"ansQ(this,'c','f1')\"><span>B</span>LEFT JOIN &mdash; retorna todas as categorias, com NULL nos campos de produto</div>","<div class=\"qop\" onclick=\"ansQ(this,'w','f1')\"><span>C</span>RIGHT JOIN &mdash; retorna todos os produtos</div>","</div><div class=\"qfb\" id=\"f1\" style=\"background:#f0fdf4;color:#15803d\">Correto! LEFT JOIN retorna todos da tabela esquerda (categoria), com NULL nas colunas da tabela direita quando não há correspondência.</div></div>"].join('');},
function(){return ["<div class=\"ey\">Recapitula&#231;&#227;o &middot; 2 min</div>","<div class=\"stitle\">Recapitulando</div>","<div class=\"rl\">","<div class=\"ri\"><div class=\"rn\">1</div><div class=\"rt\"><strong>INNER JOIN.</strong> Une tabelas pela FK. Retorna só linhas com correspondência nos dois lados.</div></div>","<div class=\"ri\"><div class=\"rn\">2</div><div class=\"rt\"><strong>LEFT JOIN.</strong> Retorna todas as linhas da tabela esquerda, com NULL quando não há correspondência à direita.</div></div>","<div class=\"ri\"><div class=\"rn\">3</div><div class=\"rt\"><strong>GROUP BY.</strong> Agrupa linhas com o mesmo valor. Toda coluna não-agregada no SELECT deve aparecer no GROUP BY.</div></div>","<div class=\"ri\"><div class=\"rn\">4</div><div class=\"rt\"><strong>COUNT, SUM, AVG, MIN, MAX.</strong> Calculam um valor por grupo.</div></div>","<div class=\"ri\"><div class=\"rn\">5</div><div class=\"rt\"><strong>HAVING.</strong> Filtra grupos após o GROUP BY. Não confundir com WHERE.</div></div>","</div>","<div class=\"hl\"><strong>Próximo passo:</strong> demo ao vivo — 6 queries JOIN e GROUP BY no banco loja.</div>"].join('');}
];

function ansQ(el,t,id){
  var qb=el.closest('.qb');
  qb.querySelectorAll('.qop').forEach(function(o){
    if(o===el) o.classList.add(t==='c'?'correct':'wrong');
    else o.classList.add('dimmed');
  });
  var fb=document.getElementById(id);
  if(t!=='c'){fb.style.background='#fef2f2';fb.style.color='#dc2626';fb.textContent='N\u00e3o exatamente \u2014 relembre o conte\u00fado do slide.';}
  fb.style.display='block';
}
function buildDots(){
  var bar=document.getElementById('dots-bar');
  bar.innerHTML='';
  for(var i=0;i<SLIDES.length;i++){
    var d=document.createElement('span');
    d.className='dot'+(i===0?' active':'');
    d.onclick=(function(idx){return function(){goTo(idx);};})(i);
    bar.appendChild(d);
    if(i<SLIDES.length-1){var sep=document.createElement('div');sep.className='dsep';bar.appendChild(sep);}
  }
}
function buildSlides(){
  var area=document.getElementById('slide-area');
  area.innerHTML='';
  for(var i=0;i<SLIDES.length;i++){
    var div=document.createElement('div');
    div.className='slide'+(i===0?' active':'');
    div.id='slide-'+i;
    div.innerHTML=SLIDES[i]();
    area.appendChild(div);
  }
}
function goTo(i){
  document.getElementById('slide-'+cur).classList.remove('active');
  var dots=document.querySelectorAll('.dot');
  dots[cur].classList.remove('active');
  if(i>cur) dots[cur].classList.add('done');
  cur=i;
  var el=document.getElementById('slide-'+cur);
  el.innerHTML=SLIDES[cur]();
  el.classList.add('active');
  dots[cur].classList.add('active');
  dots[cur].classList.remove('done');
  document.getElementById('slide-area').scrollTop=0;
  document.getElementById('btn-prev').disabled=(cur===0);
  var bn=document.getElementById('btn-next');
  bn.disabled=(cur===SLIDES.length-1);
  bn.textContent=(cur===SLIDES.length-1)?'Finalizar':'Pr\u00f3ximo \u2192';
  document.getElementById('counter').textContent=(cur+1)+' / '+SLIDES.length;
  if(!timerStarted){timerStarted=true;startTimer();}
}
function goNav(dir){var ni=cur+dir;if(ni>=0&&ni<SLIDES.length)goTo(ni);}
function startTimer(){
  var rem=45*60;
  var el=document.getElementById('timer');
  timerInterval=setInterval(function(){
    rem--;
    var m=Math.floor(rem/60),s=rem%60;
    el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
    if(rem<=300) el.className='timer warn';
    if(rem<=60)  el.className='timer danger';
    if(rem<=0){clearInterval(timerInterval);el.textContent='00:00';}
  },1000);
}
var cur=0,timerStarted=false,timerInterval=null;
buildDots();buildSlides();document.getElementById('btn-prev').disabled=true;

</script>
</body></html>
