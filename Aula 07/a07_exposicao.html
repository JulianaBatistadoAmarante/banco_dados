<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Exposi&#231;&#227;o &mdash; Agregação MongoDB e Projeto &middot; Aula 07</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;gap:8px;flex-wrap:wrap;min-height:52px}
.badge{background:#1565C0;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-title{font-size:14px;font-weight:600}.hdr-sub{font-size:12px;color:#94a3b8;margin-top:1px}
.timer{font-size:13px;font-weight:500;background:#f1f5f9;padding:5px 14px;border-radius:8px;border:1px solid #e2e8f0;font-family:monospace;color:#475569;min-width:64px;text-align:center}
.timer.warn{color:#d97706;background:#fffbeb}.timer.danger{color:#dc2626;background:#fef2f2}
.dots{display:flex;align-items:center;gap:5px;padding:9px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;overflow-x:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:#1565C0;transform:scale(1.4)}.dot.done{background:#1565C0;opacity:.4}
.dsep{width:10px;height:1px;background:#e2e8f0;flex-shrink:0}
.slide-area{flex:1;overflow-y:auto;padding:22px 28px}
.slide{display:none}.slide.active{display:block;animation:sIn .22s ease}
@keyframes sIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ey{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#1565C0;margin-bottom:5px}
.stitle{font-size:21px;font-weight:600;color:#1e293b;line-height:1.2;margin-bottom:5px}
.ssub{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px}
.card.ac{border-left:3px solid #1565C0}
.ci{font-size:18px;margin-bottom:5px}.ct{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.cb{font-size:12px;color:#64748b;line-height:1.5}
.cw{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin:10px 0}
.ch{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:7px 13px;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:500;color:#64748b}
.cd{display:flex;gap:5px}.c1{width:10px;height:10px;border-radius:50%}
pre{background:#1e293b;color:#e2e8f0;padding:13px 16px;font-size:12px;line-height:1.8;overflow-x:auto;font-family:monospace;white-space:pre;margin:0}
.hl{background:#e3f2fd;border-left:3px solid #1565C0;padding:10px 13px;font-size:12.5px;color:#0d3c6e;line-height:1.55;margin:10px 0}
.hl strong{color:#1565C0}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:560px){.two-col{grid-template-columns:1fr}}
.qb{margin-bottom:16px}.qa{font-size:13.5px;font-weight:600;color:#1e293b;margin-bottom:11px;line-height:1.5}
.qo{display:flex;flex-direction:column;gap:7px}
.qop{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:9px;transition:all .15s;color:#1e293b}
.qop:hover:not(.correct):not(.wrong):not(.dimmed){border-color:#1565C0;background:#e3f2fd}
.qop.correct{background:#f0fdf4;border-color:#86efac;color:#15803d;pointer-events:none}
.qop.wrong{background:#fef2f2;border-color:#fca5a5;color:#dc2626;pointer-events:none}
.qop.dimmed{opacity:.4;pointer-events:none}
.qfb{margin-top:9px;padding:9px 13px;border-radius:8px;font-size:12.5px;line-height:1.5;display:none}
.rl{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ri{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px}
.rn{width:23px;height:23px;min-width:23px;border-radius:6px;background:#bbdefb;color:#1565C0;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rt{font-size:13px;color:#64748b;line-height:1.55}.rt strong{color:#1e293b;font-weight:600}
.comp-table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0}
.comp-table thead tr th{background:#1565C0;color:#fff;padding:7px 10px;text-align:left;font-weight:600}
.comp-table tbody tr td{padding:7px 10px;border-bottom:1px solid #e2e8f0;color:#475569;vertical-align:top}
.comp-table tbody tr:nth-child(even){background:#f8fafc}
.rtbl{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.rtbl thead tr th{background:#1565C0;color:#fff;padding:6px 10px;text-align:left}
.rtbl tbody tr td{padding:6px 10px;border-bottom:1px solid #e2e8f0;color:#475569}
.rtbl tbody tr:nth-child(even){background:#f8fafc}
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.nb{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:7px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:#e2e8f0}.nb.pr{background:#1565C0;color:#fff;border-color:#1565C0}
.nb:disabled{opacity:.35;pointer-events:none}.nc{font-size:12px;color:#94a3b8}
.kz-footer{height:32px;background:#1e293b;display:flex;align-items:center;justify-content:center;gap:10px;flex-shrink:0}
.kz-footer a{color:#90caf9;font-size:11px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:5px}
.kz-footer a:hover{color:#bbdefb}.kz-footer span{color:#475569;font-size:11px}
.next-stage{font-size:12px;font-weight:600;background:#fff;border:1.5px solid #1565C0;color:#1565C0;padding:5px 13px;border-radius:8px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.next-stage:hover{background:#e3f2fd}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:11px">
      <span class="badge">Aula 07</span>
      <div><div class="hdr-title">Agregação MongoDB e Projeto &mdash; Exposi&#231;&#227;o Dialogada</div>
      <div class="hdr-sub">45 minutos &middot; Projetor &middot; Turma</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
      <div class="timer" id="timer">45:00</div>
      <button class="next-stage" onclick="window.location.href='a07_demo_ao_vivo.html'">&#128187; Demo &rarr;</button>
    </div>
  </div>
  <div class="dots" id="dots-bar"></div>
  <div class="slide-area" id="slide-area"></div>
  <div class="nav">
    <button class="nb" id="btn-prev" onclick="goNav(-1)" disabled>&#8592; Anterior</button>
    <span class="nc" id="counter">1 / 7</span>
    <button class="nb pr" id="btn-next" onclick="goNav(1)">Pr&#243;ximo &#8594;</button>
  </div>
  <div class="kz-footer"><a href="https://instagram.com/karizeviecelli" target="_blank" rel="noopener"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>@karizeviecelli</a><span>·</span><span>© 2026</span></div>
</div>
<script>
var SLIDES=[
function(){return ["<div class=\"ey\">Abertura &middot; 3 min</div>","<div class=\"stitle\">7 aulas de jornada — hoje fechamos o ciclo</div>","<div class=\"ssub\">Passamos por modelagem, SQL, JOINs, transações e MongoDB. Hoje conectamos tudo: pipeline de agregação, comparativo SQL×NoSQL e o projeto integrador.</div>","<div class=\"cards\">","<div class=\"card ac\"><div class=\"ci\">&#128208;</div><div class=\"ct\">Aulas 1&ndash;2</div><div class=\"cb\">Conceitos, entidades, cardinalidade, DER, crow's foot.</div></div>","<div class=\"card ac\"><div class=\"ci\">&#128190;</div><div class=\"ct\">Aulas 3&ndash;5</div><div class=\"cb\">CREATE TABLE, INSERT, SELECT, JOIN, GROUP BY, UPDATE, DELETE, VIEW.</div></div>","<div class=\"card ac\"><div class=\"ci\">&#127807;</div><div class=\"ct\">Aulas 6&ndash;7</div><div class=\"cb\">MongoDB CRUD, aggregate, comparativo, projeto integrador.</div></div>","<div class=\"card\"><div class=\"ci\">&#127919;</div><div class=\"ct\">Hoje</div><div class=\"cb\">Pipeline aggregate, comparativo lado a lado, critérios de decisão e apresentação do projeto.</div></div>","</div>"].join('');},
function(){return ["<div class=\"ey\">Aggregate &middot; 5 min</div>","<div class=\"stitle\">Pipeline de Agrega&#231;&#227;o MongoDB</div>","<div class=\"cw\"><div class=\"ch\"><span>MongoDB &mdash; $match + $group + $sort</span><div class=\"cd\"><div class=\"c1\" style=\"background:#ef4444\"></div><div class=\"c1\" style=\"background:#f59e0b\"></div><div class=\"c1\" style=\"background:#10b981\"></div></div></div>","<pre>db.produtos.aggregate([\n  { $match: { preco: { $gt: 40 } } },\n  { $group: {\n      _id: \"$categoria.nome\",\n      total: { $sum: 1 },\n      media: { $avg: \"$preco\" }\n  } },\n  { $sort: { media: -1 } }\n])</pre></div>","<div class=\"hl\"><strong>Pipeline = SQL reorganizado:</strong> $match = WHERE &middot; $group = GROUP BY &middot; $sort = ORDER BY &middot; $project = SELECT colunas &middot; $limit = LIMIT.</div>"].join('');},
function(){return ["<div class=\"ey\">Comparativo &middot; 4 min</div>","<div class=\"stitle\">A mesma consulta — dois bancos</div>","<div class=\"cw\"><div class=\"ch\"><span>SQL vs MongoDB lado a lado</span><div class=\"cd\"><div class=\"c1\" style=\"background:#ef4444\"></div><div class=\"c1\" style=\"background:#f59e0b\"></div><div class=\"c1\" style=\"background:#10b981\"></div></div></div>","<pre>-- MySQL: JOIN + GROUP BY\nSELECT c.nome, COUNT(*), AVG(p.preco)\nFROM produto p\nINNER JOIN categoria c\n  ON p.id_categoria = c.id_categoria\nGROUP BY c.nome;\n\n// MongoDB: aggregate sem JOIN\ndb.produtos.aggregate([\n  { $group: {\n      _id: \"$categoria.nome\",\n      total: { $sum: 1 },\n      media: { $avg: \"$preco\" }\n  } }\n])</pre></div>","<div class=\"hl\"><strong>MySQL normaliza</strong> (sem duplicação, FK, JOIN necessário). <strong>MongoDB desnormaliza</strong> via embedding (duplicação aceitável, sem FK automática, sem JOIN).</div>"].join('');},
function(){return ["<div class=\"ey\">Decis&#227;o &middot; 4 min</div>","<div class=\"stitle\">Quando usar MySQL vs MongoDB</div>","<div class=\"two-col\">","<div><div style=\"font-size:12px;font-weight:600;color:#1565C0;margin-bottom:7px\">Use MySQL quando...</div>","<div style=\"display:flex;flex-direction:column;gap:5px\">","<div style=\"background:#e3f2fd;padding:7px 10px;border-radius:7px;font-size:12px;color:#0d3c6e\">&#10003; Dados altamente relacionais (ERP, financeiro)</div>","<div style=\"background:#e3f2fd;padding:7px 10px;border-radius:7px;font-size:12px;color:#0d3c6e\">&#10003; Transa&ccedil;&otilde;es ACID cr&iacute;ticas</div>","<div style=\"background:#e3f2fd;padding:7px 10px;border-radius:7px;font-size:12px;color:#0d3c6e\">&#10003; Schema bem definido e est&aacute;vel</div>","</div></div>","<div><div style=\"font-size:12px;font-weight:600;color:#166534;margin-bottom:7px\">Use MongoDB quando...</div>","<div style=\"display:flex;flex-direction:column;gap:5px\">","<div style=\"background:#f0fdf4;padding:7px 10px;border-radius:7px;font-size:12px;color:#166534\">&#10003; Schema vari&aacute;vel ou evolutivo</div>","<div style=\"background:#f0fdf4;padding:7px 10px;border-radius:7px;font-size:12px;color:#166534\">&#10003; Alta escala de escrita (logs, IoT)</div>","<div style=\"background:#f0fdf4;padding:7px 10px;border-radius:7px;font-size:12px;color:#166534\">&#10003; Documentos hier&aacute;rquicos</div>","</div></div>","</div>"].join('');},
function(){return ["<div class=\"ey\">Projeto &middot; 4 min</div>","<div class=\"stitle\">Projeto integrador — o que entregar</div>","<div class=\"rl\">","<div class=\"ri\"><div class=\"rn\">1</div><div class=\"rt\"><strong>DER no draw.io.</strong> M&iacute;nimo 5 entidades, crow's foot, cardinalidade correta. Exportar como PNG.</div></div>","<div class=\"ri\"><div class=\"rn\">2</div><div class=\"rt\"><strong>SQL no Workbench.</strong> CREATE TABLE com PKs e FKs. INSERT na ordem correta. 2 queries INNER JOIN. 1 GROUP BY + agrega&ccedil;&atilde;o.</div></div>","<div class=\"ri\"><div class=\"rn\">3</div><div class=\"rt\"><strong>Comparativo escrito.</strong> 1 p&aacute;gina: MySQL ou MongoDB, 3 justificativas t&eacute;cnicas, 2 benef&iacute;cios de neg&oacute;cio.</div></div>","<div class=\"ri\"><div class=\"rn\">4</div><div class=\"rt\"><strong>Apresenta&ccedil;&atilde;o oral.</strong> 5 minutos: contexto &rarr; DER &rarr; SQL ao vivo &rarr; MongoDB &rarr; comparativo.</div></div>","</div>"].join('');},
function(){return ["<div class=\"ey\">Quiz &middot; 3 min</div>","<div class=\"stitle\">Verifica&#231;&#227;o de aprendizagem final</div>","<div class=\"qb\"><div class=\"qa\">1. Um sistema de folha de pagamento precisa garantir que débito e crédito sejam atômicos. Qual banco?</div>","<div class=\"qo\">","<div class=\"qop\" onclick=\"ansQ(this,'c','f0')\"><span>A</span>MySQL &mdash; transações ACID são nativas e maduras</div>","<div class=\"qop\" onclick=\"ansQ(this,'w','f0')\"><span>B</span>MongoDB &mdash; escala melhor horizontalmente</div>","<div class=\"qop\" onclick=\"ansQ(this,'w','f0')\"><span>C</span>São equivalentes para esse caso</div>","</div><div class=\"qfb\" id=\"f0\" style=\"background:#f0fdf4;color:#15803d\">Correto! ACID é o ponto forte do SQL para sistemas financeiros. Uma transferência parcial deixaria o banco inconsistente — exige atomicidade total.</div></div>","<div class=\"qb\"><div class=\"qa\">2. Um catálogo de produtos onde TV tem polegadas, camiseta tem tamanho e cor, sapato tem numeração. Qual banco?</div>","<div class=\"qo\">","<div class=\"qop\" onclick=\"ansQ(this,'w','f1')\"><span>A</span>MySQL &mdash; tabela com muitas colunas NULL</div>","<div class=\"qop\" onclick=\"ansQ(this,'c','f1')\"><span>B</span>MongoDB &mdash; schema flex&iacute;vel permite atributos vari&aacute;veis por tipo</div>","<div class=\"qop\" onclick=\"ansQ(this,'w','f1')\"><span>C</span>S&atilde;o equivalentes</div>","</div><div class=\"qfb\" id=\"f1\" style=\"background:#f0fdf4;color:#15803d\">Correto! Schema flexível do MongoDB é ideal para catálogos com atributos variáveis. Em MySQL seria necessário uma tabela EAV (Entity-Attribute-Value) — um workaround complexo.</div></div>"].join('');},
function(){return ["<div class=\"ey\">Encerramento &middot; 3 min</div>","<div class=\"stitle\">O que voc&#234; aprendeu neste curso</div>","<div class=\"rl\">","<div class=\"ri\"><div class=\"rn\">&#128208;</div><div class=\"rt\"><strong>Modelagem.</strong> DER com entidades, atributos, cardinalidade. Notação crow's foot. draw.io.</div></div>","<div class=\"ri\"><div class=\"rn\">&#128190;</div><div class=\"rt\"><strong>SQL.</strong> CREATE TABLE, PKs, FKs, INSERT, SELECT, JOIN, GROUP BY, HAVING, UPDATE, DELETE, VIEW, subconsultas.</div></div>","<div class=\"ri\"><div class=\"rn\">&#127807;</div><div class=\"rt\"><strong>MongoDB.</strong> Documentos JSON, embedding, CRUD, find() com operadores, pipeline aggregate.</div></div>","<div class=\"ri\"><div class=\"rn\">&#9878;&#65039;</div><div class=\"rt\"><strong>Decisão tecnológica.</strong> SQL para dados relacionais e ACID. NoSQL para schema flexível e escala. Nem melhor nem pior — diferente.</div></div>","</div>","<div class=\"hl\"><strong>Pr&oacute;ximos passos:</strong> dev.mysql.com/doc &middot; mongodb.com/docs &middot; MongoDB University (gratuito) &middot; Certifica&ccedil;&atilde;o MySQL OCA.</div>"].join('');}
];

function ansQ(el,t,id){
  var qb=el.closest('.qb');
  qb.querySelectorAll('.qop').forEach(function(o){
    if(o===el) o.classList.add(t==='c'?'correct':'wrong');
    else o.classList.add('dimmed');
  });
  var fb=document.getElementById(id);
  if(t!=='c'){fb.style.background='#fef2f2';fb.style.color='#dc2626';fb.textContent='N\u00e3o exatamente \u2014 relembre o conte\u00fado do slide.';}
  fb.style.display='block';
}
function buildDots(){
  var bar=document.getElementById('dots-bar');
  bar.innerHTML='';
  for(var i=0;i<SLIDES.length;i++){
    var d=document.createElement('span');
    d.className='dot'+(i===0?' active':'');
    d.onclick=(function(idx){return function(){goTo(idx);};})(i);
    bar.appendChild(d);
    if(i<SLIDES.length-1){var sep=document.createElement('div');sep.className='dsep';bar.appendChild(sep);}
  }
}
function buildSlides(){
  var area=document.getElementById('slide-area');
  area.innerHTML='';
  for(var i=0;i<SLIDES.length;i++){
    var div=document.createElement('div');
    div.className='slide'+(i===0?' active':'');
    div.id='slide-'+i;
    div.innerHTML=SLIDES[i]();
    area.appendChild(div);
  }
}
function goTo(i){
  document.getElementById('slide-'+cur).classList.remove('active');
  var dots=document.querySelectorAll('.dot');
  dots[cur].classList.remove('active');
  if(i>cur) dots[cur].classList.add('done');
  cur=i;
  var el=document.getElementById('slide-'+cur);
  el.innerHTML=SLIDES[cur]();
  el.classList.add('active');
  dots[cur].classList.add('active');
  dots[cur].classList.remove('done');
  document.getElementById('slide-area').scrollTop=0;
  document.getElementById('btn-prev').disabled=(cur===0);
  var bn=document.getElementById('btn-next');
  bn.disabled=(cur===SLIDES.length-1);
  bn.textContent=(cur===SLIDES.length-1)?'Finalizar':'Pr\u00f3ximo \u2192';
  document.getElementById('counter').textContent=(cur+1)+' / '+SLIDES.length;
  if(!timerStarted){timerStarted=true;startTimer();}
}
function goNav(dir){var ni=cur+dir;if(ni>=0&&ni<SLIDES.length)goTo(ni);}
function startTimer(){
  var rem=45*60;
  var el=document.getElementById('timer');
  timerInterval=setInterval(function(){
    rem--;
    var m=Math.floor(rem/60),s=rem%60;
    el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
    if(rem<=300) el.className='timer warn';
    if(rem<=60)  el.className='timer danger';
    if(rem<=0){clearInterval(timerInterval);el.textContent='00:00';}
  },1000);
}
var cur=0,timerStarted=false,timerInterval=null;
buildDots();buildSlides();document.getElementById('btn-prev').disabled=true;

</script>
</body></html>
