<script>const STEPS=[
{title:"aggregate() — $match + $group + $sort",time:"20 min",
instrs:[
  "Execute o pipeline e compare com a query GROUP BY da Aula 04",
  "$match filtra antes do agrupamento (= WHERE)",
  "$group com _id define o campo de agrupamento (= GROUP BY)",
  "$sum: 1 conta documentos (= COUNT(*))"
],
code:`db.produtos.aggregate([\n  { $match: { preco: { $gt: 40 } } },\n  { $group: {\n      _id: "$categoria.nome",\n      total:        { $sum: 1 },\n      preco_medio:  { $avg: "$preco" },\n      valor_est:    { $sum: { $multiply: ["$preco","$estoque"] } }\n  } },\n  { $sort: { valor_est: -1 } }\n])`,
tip:"<strong>Pipeline = SQL reorganizado:</strong> $match = WHERE &middot; $group = GROUP BY &middot; $sort = ORDER BY &middot; $project = SELECT colunas &middot; $limit = LIMIT. A ordem dos est&aacute;gios importa: $match antes do $group &eacute; mais eficiente."},
{title:"$addFields + $project — campos calculados",time:"15 min",
instrs:[
  "$addFields cria um campo calculado sem modificar o documento original",
  "$project define quais campos aparecem: 1 = incluir, 0 = excluir",
  "_id &eacute; sempre inclu&iacute;do por padr&atilde;o &mdash; exclua com _id: 0",
  "Combine: $addFields &rarr; $match (filtrar por valor_item) &rarr; $project &rarr; $sort"
],
code:`db.produtos.aggregate([\n  { $addFields: {\n      valor_item: { $multiply: ["$preco","$estoque"] }\n  } },\n  { $project: {\n      nome: 1, preco: 1, estoque: 1,\n      valor_item: 1, _id: 0\n  } },\n  { $sort: { valor_item: -1 } }\n])`,
tip:"<strong>$addFields</strong> equivale a uma coluna calculada no SELECT do SQL: SELECT preco * estoque AS valor_item. A diferen&ccedil;a: no pipeline voc&ecirc; pode referenciar o campo criado nos est&aacute;gios seguintes."},
{title:"Comparativo lado a lado — SQL vs MongoDB",time:"15 min",
instrs:[
  "Execute as duas queries e compare os resultados &mdash; s&atilde;o equivalentes",
  "Observe as diferen&ccedil;as de sintaxe: SQL declarativo vs MongoDB JSON",
  "No MySQL: JOIN foi necess&aacute;rio. No MongoDB: embedding eliminou o JOIN",
  "Discuta: qual &eacute; mais leg&iacute;vel para voc&ecirc;? Qual &eacute; mais flex&iacute;vel?"
],
code:`-- MySQL: GROUP BY com INNER JOIN\nSELECT c.nome, COUNT(*), AVG(p.preco)\nFROM produto p\nINNER JOIN categoria c\n  ON p.id_categoria = c.id_categoria\nGROUP BY c.nome;\n\n// MongoDB: aggregate sem JOIN\ndb.produtos.aggregate([\n  { $group: {\n      _id: "$categoria.nome",\n      total: { $sum: 1 },\n      media: { $avg: "$preco" }\n  } }\n])`,
tip:"<strong>SQL vs MongoDB &mdash; n&atilde;o &eacute; melhor ou pior, &eacute; diferente.</strong> MySQL normaliza (sem duplica&ccedil;&atilde;o, FK garante consist&ecirc;ncia, JOIN necess&aacute;rio). MongoDB desnormaliza via embedding (duplica&ccedil;&atilde;o aceit&aacute;vel, sem FK autom&aacute;tica, sem JOIN)."},
{title:"Quando usar MySQL vs MongoDB",time:"15 min",
instrs:[
  "Para cada caso discuta com a turma: MySQL ou MongoDB?",
  "Caso 1: sistema de folha de pagamento com auditoria completa",
  "Caso 2: cat&aacute;logo de produtos com atributos vari&aacute;veis por tipo",
  "Caso 3: log de eventos de um servidor (milh&otilde;es de registros/dia)"
],
code:`/* CRIT&Eacute;RIOS DE DECIS&Atilde;O\n\nUse MySQL quando:\n  Dados altamente relacionais (ERP, financeiro)\n  Transa&ccedil;&otilde;es ACID cr&iacute;ticas (banco, e-commerce)\n  Schema bem definido e est&aacute;vel\n  Relat&oacute;rios com m&uacute;ltiplos JOINs\n\nUse MongoDB quando:\n  Schema vari&aacute;vel ou evolutivo\n  Documentos hier&aacute;rquicos (cat&aacute;logo, config)\n  Alta escala de escrita (logs, IoT)\n  Prototipagem r&aacute;pida sem schema fixo\n*/`,
tip:"<strong>Respostas para os casos:</strong> Folha de pagamento &rarr; MySQL (ACID). Cat&aacute;logo vari&aacute;vel &rarr; MongoDB (schema flex&iacute;vel). Log de eventos &rarr; MongoDB (volume, escrita r&aacute;pida)."},
{title:"Projeto integrador — DER + SQL",time:"30 min",
instrs:[
  "Abra o draw.io e desenhe o DER com pelo menos 5 entidades e crow's foot",
  "No Workbench: CREATE DATABASE projeto_final e crie todas as tabelas com PKs e FKs",
  "Insira dados em todas as tabelas na ordem correta",
  "Execute 2 queries INNER JOIN e 1 GROUP BY + agrega&ccedil;&atilde;o"
],
code:`-- Template do projeto\nCREATE DATABASE projeto_final;\nUSE projeto_final;\n\n-- Tabelas pai primeiro\nCREATE TABLE departamento (\n  id INT AUTO_INCREMENT,\n  nome VARCHAR(80) NOT NULL,\n  PRIMARY KEY (id)\n);\n\n-- Tabela filho com FK\nCREATE TABLE funcionario (\n  id       INT AUTO_INCREMENT,\n  id_depto INT NOT NULL,\n  nome     VARCHAR(120) NOT NULL,\n  salario  DECIMAL(10,2),\n  PRIMARY KEY (id),\n  FOREIGN KEY (id_depto)\n    REFERENCES departamento(id)\n);`,
tip:"<strong>Dica de organiza&ccedil;&atilde;o do DER:</strong> posicione as entidades pai no topo (departamento, categoria, cliente) e as entidades filho abaixo (funcionario, produto, pedido). As linhas de relacionamento ficam mais limpas assim."},
{title:"Projeto integrador — Apresentação oral",time:"30 min",
instrs:[
  "Cada aluno apresenta por 5 minutos &mdash; docente cronometra",
  "Mostrar: DER no draw.io + query SQL rodando no Workbench + find() no Compass",
  "Responder: por que voc&ecirc; escolheu essa tecnologia para esse caso de uso?",
  "Avalia&ccedil;&atilde;o: DER correto + SQL funcional + comparativo justificado + apresenta&ccedil;&atilde;o clara"
],
code:`/* ROTEIRO DA APRESENTA&Ccedil;&Atilde;O (5 min)\n\n1. Contexto (30s)\n   Qual sistema voc&ecirc; modelou?\n\n2. DER (1 min)\n   Mostre o diagrama &mdash; explique entidades e FKs\n\n3. SQL ao vivo (1 min)\n   Execute um SELECT com INNER JOIN\n\n4. MongoDB (1 min)\n   Mostre um find() ou aggregate\n\n5. Comparativo (1 min)\n   MySQL ou MongoDB para esse sistema? Por qu&ecirc;?\n*/`,
tip:"<strong>Dica pr&aacute;tica:</strong> abra tudo antes de come&ccedil;ar &mdash; draw.io, Workbench e Compass. Tenha screenshots de backup caso a conex&atilde;o caia durante a apresenta&ccedil;&atilde;o."}
];</script>
<script>
let done=new Set();
function build(){
  const list=document.getElementById('steps');
  STEPS.forEach((s,i)=>{
    const card=document.createElement('div');
    card.className='sc'+(i===0?' open-c':'');
    card.id='sc-'+i;
    let gab='';
    if(s.code){
      gab=`<div class="gab-wrap">
        <button class="gab-btn" id="gbtn-${i}" onclick="togGab(${i})">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Ver gabarito <span class="arr">&#9662;</span>
        </button>
        <div class="gab-body" id="gab-${i}">
          <div class="cw" style="margin-top:7px">
            <div class="ch2"><span>Gabarito</span><div class="cdd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div>
            <pre>${s.code}</pre>
          </div>
        </div>
      </div>`;
    }
    card.innerHTML=`<div class="sh" onclick="tog(${i})">
      <div class="chk" id="chk-${i}" onclick="event.stopPropagation();mk(${i})">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="si"><div class="sn2">Passo ${i+1} de ${STEPS.length}</div><div class="st">${s.title}</div><div class="stm">${s.time}</div></div>
      <span class="cv">${i===0?'&#9650;':'&#9660;'}</span>
    </div>
    <div class="sb"><div class="sbi">
      <div class="il">${s.instrs.map((t,j)=>`<div class="ii"><div class="in">${j+1}</div><span>${t}</span></div>`).join('')}</div>
      ${gab}
      <div class="tip">${s.tip}</div>
      <button class="mb" id="mb-${i}" onclick="mk(${i})">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Marcar como conclui&#769;do
      </button>
    </div></div>`;
    list.appendChild(card);
  });
}
function togGab(i){
  document.getElementById('gbtn-'+i).classList.toggle('open');
  document.getElementById('gab-'+i).classList.toggle('open');
}
function tog(i){
  const c=document.getElementById('sc-'+i);
  const o=c.classList.contains('open-c');
  document.querySelectorAll('.sc').forEach(x=>{x.classList.remove('open-c');x.querySelector('.cv').innerHTML='&#9660;';});
  if(!o){c.classList.add('open-c');c.querySelector('.cv').innerHTML='&#9650;';}
}
function mk(i){
  if(done.has(i))return;
  done.add(i);
  document.getElementById('chk-'+i).classList.add('done');
  document.getElementById('sc-'+i).classList.add('done-c');
  const mb=document.getElementById('mb-'+i);
  mb.classList.add('done-btn');
  mb.innerHTML='<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Conclu&#237;do!';
  upd();
  if(i<STEPS.length-1){
    document.querySelectorAll('.sc').forEach(x=>{x.classList.remove('open-c');x.querySelector('.cv').innerHTML='&#9660;';});
    const nx=document.getElementById('sc-'+(i+1));
    nx.classList.add('open-c');nx.querySelector('.cv').innerHTML='&#9650;';
    setTimeout(()=>nx.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
  }
  if(done.size===STEPS.length)document.getElementById('success-el').classList.add('show');
}
function upd(){
  document.getElementById('pf').style.width=Math.round((done.size/STEPS.length)*100)+'%';
  document.getElementById('pt').textContent=done.size+' / '+STEPS.length;
}
build();upd();
</script>
</body></html>
