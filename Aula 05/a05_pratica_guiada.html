<script>const STEPS=[
{title:"UPDATE com WHERE — atualizar dados",time:"15 min",
instrs:[
  "SEMPRE execute um SELECT com o mesmo WHERE antes de fazer UPDATE",
  "Atualize o preço da Camiseta Azul para 54.90",
  "Tente executar UPDATE sem WHERE — o que acontece com todos os registros?",
  "Use ROLLBACK para desfazer se estiver dentro de uma transação"
],
code:`-- PASSO 1: confirmar o que vai ser alterado\nSELECT nome, preco FROM produto\nWHERE nome = 'Camiseta Azul';\n\n-- PASSO 2: executar o UPDATE\nUPDATE produto\nSET preco = 54.90\nWHERE nome = 'Camiseta Azul';\n\n-- PASSO 3: confirmar\nSELECT nome, preco FROM produto\nWHERE nome = 'Camiseta Azul';`,
tip:"<strong>Regra de ouro do UPDATE:</strong> sempre escreva o WHERE primeiro, teste com SELECT, só então execute o UPDATE. Um UPDATE sem WHERE altera TODOS os registros da tabela — não tem Ctrl+Z no SQL sem transação ativa."},
{title:"DELETE com WHERE — remover registros",time:"15 min",
instrs:[
  "Insira um produto temporário para deletar: INSERT INTO produto (id_categoria,nome,preco) VALUES (1,'Teste',9.90)",
  "Confirme com SELECT que o produto existe",
  "Execute o DELETE com WHERE pelo id — nunca pelo nome em produção",
  "Tente deletar uma categoria que tem produtos — o que acontece?"
],
code:`-- Inserir produto para testar\nINSERT INTO produto (id_categoria, nome, preco)\nVALUES (1, 'Produto Teste', 9.90);\n\n-- Confirmar antes de deletar\nSELECT id_produto, nome FROM produto\nWHERE nome = 'Produto Teste';\n\n-- Deletar pelo ID (mais seguro que pelo nome)\nDELETE FROM produto\nWHERE id_produto = LAST_INSERT_ID();\n\n-- Tentar deletar categoria com produtos (deve dar erro)\nDELETE FROM categoria WHERE id_categoria = 1;`,
tip:"<strong>ON DELETE RESTRICT</strong> entra em ação aqui — o banco recusa deletar uma categoria que tem produtos. Para deletar a categoria, precisaria deletar os produtos primeiro (ou usar ON DELETE CASCADE, que faz isso automaticamente)."},
{title:"Transações — START TRANSACTION, COMMIT, ROLLBACK",time:"20 min",
instrs:[
  "Inicie uma transação com START TRANSACTION",
  "Execute um UPDATE dentro da transação",
  "Use SELECT para ver a mudança (visível só na sua sessão)",
  "Execute ROLLBACK — a mudança é desfeita. Execute COMMIT — a mudança é persistida"
],
code:`-- Iniciar transação\nSTART TRANSACTION;\n\n-- Fazer alterações\nUPDATE produto\nSET preco = preco * 1.10\nWHERE id_categoria = 1;\n\n-- Ver o resultado (só você vê por enquanto)\nSELECT nome, preco FROM produto\nWHERE id_categoria = 1;\n\n-- Desfazer tudo\nROLLBACK;\n\n-- OU confirmar permanentemente\n-- COMMIT;`,
tip:"<strong>Transações ACID</strong> garantem que ou tudo funciona ou nada muda. START TRANSACTION abre a transação. COMMIT salva permanentemente. ROLLBACK desfaz tudo desde o START TRANSACTION. Fundamental para operações críticas como transferências bancárias."},
{title:"BETWEEN, IN, IS NULL — operadores especiais",time:"10 min",
instrs:[
  "Use BETWEEN para filtrar produtos em uma faixa de preço",
  "Use IN para filtrar por lista de categorias",
  "Adicione um produto sem telefone e use IS NULL para encontrá-lo",
  "Combine os três em uma query só com AND/OR"
],
code:`-- BETWEEN: faixa de valores\nSELECT nome, preco FROM produto\nWHERE preco BETWEEN 40 AND 150;\n\n-- IN: lista de valores\nSELECT nome FROM produto\nWHERE id_categoria IN (1, 2);\n\n-- IS NULL: campo sem valor\nSELECT nome, telefone FROM cliente\nWHERE telefone IS NULL;\n\n-- Combinando\nSELECT nome, preco FROM produto\nWHERE preco BETWEEN 40 AND 200\n  AND id_categoria IN (1,2)\n  AND ativo = 1;`,
tip:"<strong>IS NULL</strong> (não = NULL). Em SQL, NULL não é igual a nada — nem a si mesmo. Por isso WHERE telefone = NULL nunca retorna resultado. Sempre use IS NULL ou IS NOT NULL para verificar valores ausentes."},
{title:"Subconsulta no WHERE — SELECT dentro de SELECT",time:"15 min",
instrs:[
  "Execute a subconsulta interna primeiro (SELECT AVG...) — entenda o que ela retorna",
  "Depois execute a query completa",
  "Subconsulta retorna um valor único que é usado como filtro do WHERE externo",
  "Reescreva usando uma variável: SET @media = (SELECT AVG...); SELECT ... WHERE preco > @media"
],
code:`-- Produtos com preco acima da media\nSELECT nome, preco\nFROM produto\nWHERE preco > (\n  SELECT AVG(preco) FROM produto\n)\nORDER BY preco DESC;\n\n-- Mesma query com variavel\nSET @media = (SELECT AVG(preco) FROM produto);\nSELECT nome, preco\nFROM produto\nWHERE preco > @media\nORDER BY preco DESC;`,
tip:"<strong>Subconsulta escalar</strong> retorna um único valor e pode ser usada no WHERE, HAVING ou SELECT. Se a subconsulta retornar mais de uma linha, use IN em vez de &gt;: WHERE id_categoria IN (SELECT id_categoria FROM categoria WHERE nome LIKE 'R%')."},
{title:"CREATE VIEW — salvar uma consulta como tabela virtual",time:"15 min",
instrs:[
  "Crie a VIEW de relatório de estoque",
  "Execute SELECT * FROM vw_estoque_categoria — como se fosse uma tabela",
  "A VIEW não armazena dados — ela executa a query toda vez que é consultada",
  "Adicione um novo produto e re-execute SELECT * FROM vw_estoque_categoria — atualiza automaticamente"
],
code:`-- Criar a VIEW\nCREATE OR REPLACE VIEW vw_estoque_categoria AS\nSELECT\n  c.nome                    AS categoria,\n  COUNT(p.id_produto)       AS qtd_produtos,\n  SUM(p.estoque)            AS estoque_total,\n  ROUND(AVG(p.preco), 2)   AS preco_medio\nFROM categoria c\nINNER JOIN produto p\n  ON c.id_categoria = p.id_categoria\nWHERE p.ativo = 1\nGROUP BY c.nome\nORDER BY estoque_total DESC;\n\n-- Usar a VIEW\nSELECT * FROM vw_estoque_categoria;\nSELECT * FROM vw_estoque_categoria WHERE qtd_produtos >= 2;`,
tip:"<strong>VIEW</strong> é uma consulta salva com nome. Simplifica queries complexas, melhora a legibilidade e pode restringir quais dados um usuário consegue ver. OR REPLACE permite recriar a VIEW se ela já existir sem dar erro."}
];</script>

      gab=`<div class="gab-wrap">
        <button class="gab-btn" id="gbtn-${i}" onclick="togGab(${i})">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Ver gabarito <span class="arr">&#9662;</span>
        </button>
        <div class="gab-body" id="gab-${i}">
          <div class="cw" style="margin-top:7px">
            <div class="ch2"><span>Gabarito</span><div class="cdd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div>
            <pre>${s.code}</pre>
          </div>
        </div>
      </div>`;
    }
    card.innerHTML=`<div class="sh" onclick="tog(${i})">
      <div class="chk" id="chk-${i}" onclick="event.stopPropagation();mk(${i})">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="si"><div class="sn2">Passo ${i+1} de ${STEPS.length}</div><div class="st">${s.title}</div><div class="stm">${s.time}</div></div>
      <span class="cv">${i===0?'&#9650;':'&#9660;'}</span>
    </div>
    <div class="sb"><div class="sbi">
      <div class="il">${s.instrs.map((t,j)=>`<div class="ii"><div class="in">${j+1}</div><span>${t}</span></div>`).join('')}</div>
      ${gab}
      <div class="tip">${s.tip}</div>
      <button class="mb" id="mb-${i}" onclick="mk(${i})">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Marcar como conclui&#769;do
      </button>
    </div></div>`;
    list.appendChild(card);
  });
}
function togGab(i){
  document.getElementById('gbtn-'+i).classList.toggle('open');
  document.getElementById('gab-'+i).classList.toggle('open');
}
function tog(i){
  const c=document.getElementById('sc-'+i);
  const o=c.classList.contains('open-c');
  document.querySelectorAll('.sc').forEach(x=>{x.classList.remove('open-c');x.querySelector('.cv').innerHTML='&#9660;';});
  if(!o){c.classList.add('open-c');c.querySelector('.cv').innerHTML='&#9650;';}
}
function mk(i){
  if(done.has(i))return;
  done.add(i);
  document.getElementById('chk-'+i).classList.add('done');
  document.getElementById('sc-'+i).classList.add('done-c');
  const mb=document.getElementById('mb-'+i);
  mb.classList.add('done-btn');
  mb.innerHTML='<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Conclu&#237;do!';
  upd();
  if(i<STEPS.length-1){
    document.querySelectorAll('.sc').forEach(x=>{x.classList.remove('open-c');x.querySelector('.cv').innerHTML='&#9660;';});
    const nx=document.getElementById('sc-'+(i+1));
    nx.classList.add('open-c');nx.querySelector('.cv').innerHTML='&#9650;';
    setTimeout(()=>nx.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
  }
  if(done.size===STEPS.length)document.getElementById('success-el').classList.add('show');
}
function upd(){
  document.getElementById('pf').style.width=Math.round((done.size/STEPS.length)*100)+'%';
  document.getElementById('pt').textContent=done.size+' / '+STEPS.length;
}
build();upd();
</script>
</body></html>
