<script>
const SK="feedback_v2_a04";
const AC="#15803d";const AC_LT="#86efac";
const CHECKS=["INNER JOIN com alias", "LEFT JOIN correto", "GROUP BY na coluna certa", "HAVING não WHERE", "Funções COUNT/SUM/AVG usadas"];
const PONTOS_BASE=[{"t": "Qual a diferença entre INNER JOIN e LEFT JOIN? Quando usar cada um?", "tag": "JOIN"}, {"t": "Por que WHERE COUNT(*) > 1 dá erro e HAVING COUNT(*) > 1 funciona?", "tag": "HAVING"}, {"t": "O que acontece se esquecer o GROUP BY numa query com COUNT?", "tag": "GROUP BY"}, {"t": "Como calcular o valor total de estoque (preco × estoque) por categoria?", "tag": "SUM"}, {"t": "Preview Aula 05: como atualizar o preço de todos os produtos de uma categoria?", "tag": "próxima aula"}];
</script>
<script>
const CORES=[{bg:"#bbdefb",txt:"#1565C0"},{bg:"#ccfbf1",txt:"#0f766e"},{bg:"#fef3c7",txt:"#92400e"},{bg:"#fce7f3",txt:"#9d174d"},{bg:"#dcfce7",txt:"#166534"},{bg:"#fee2e2",txt:"#991b1b"},{bg:"#e0f2fe",txt:"#0369a1"},{bg:"#f3e8ff",txt:"#6b21a8"}];
function salvar(){try{localStorage.setItem(SK,JSON.stringify({alunos,pontos,tSec}));flashSave();}catch(e){}}
function carregar(){try{const raw=localStorage.getItem(SK);if(!raw)return;const d=JSON.parse(raw);if(d.alunos)alunos=d.alunos;if(d.pontos)pontos=d.pontos;if(typeof d.tSec==='number')tSec=d.tSec;}catch(e){}}
function flashSave(){const el=document.getElementById('save-indicator');if(!el)return;el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',1400);}
function limparDados(){if(!confirm('Apagar todos os dados?'))return;try{localStorage.removeItem(SK);}catch(e){}location.reload();}
let alunos=[],pontos=PONTOS_BASE.map(p=>({...p,used:false}));
let tSec=30*60,tInterval=null,ticking=false;
function init(n){return n.trim().split(/\s+/).slice(0,2).map(x=>x[0]).join('').toUpperCase();}
function buildAlunos(){
  const container=document.getElementById('grid-container');
  if(alunos.length===0){container.innerHTML='<div class="empty-state"><p>Nenhum aluno cadastrado.<br>Clique em <strong>+ Aluno</strong> para adicionar.</p><button class="empty-btn" onclick="addAluno()">+ Adicionar primeiro aluno</button></div>';updateStats();return;}
  const g=document.createElement('div');g.className='grid';
  alunos.forEach((a,ai)=>{
    const av=CORES[a.cor%CORES.length];
    const stLbl=a.status==='pendente'?'Aguardando':a.status==='apresentando'?'Apresentando agora':'Conclui&#769;do';
    const card=document.createElement('div');
    card.className='ac'+(a.status==='apresentando'?' pres':'')+(a.status==='concluido'?' conc':'');
    card.innerHTML=`<div class="at"><div class="av" style="background:${av.bg};color:${av.txt}">${a.iniciais}</div><div><div class="an" style="color:${av.txt}">${a.nome}</div><div class="as">${stLbl}</div></div><button class="del-btn" onclick="excluirAluno(${ai})" title="Excluir">&#x2715;</button></div><div class="ab"><div class="stars">${[1,2,3,4,5].map(n=>`<span class="star${a.nota>=n?' on':''}" onclick="setStar(${ai},${n})">&#9733;</span>`).join('')}</div><div class="chks">${CHECKS.map((c,ci)=>`<div class="chk2"><div class="mc${a.checks[ci]?' on':''}" id="mc-${ai}-${ci}" onclick="togChk(${ai},${ci})"><svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1 4.5l2.5 2.5 4-4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span>${c}</span></div>`).join('')}</div><textarea class="note" rows="2" placeholder="Obs..." oninput="saveNote(${ai},this.value)">${a.nota_txt}</textarea><div class="acts"><div class="act${a.status==='apresentando'?' pon':''}" onclick="setStatus(${ai},'apresentando')">Apresentando</div><div class="act${a.status==='concluido'?' don':''}" onclick="setStatus(${ai},'concluido')">Conclui&#769;do</div></div></div>`;
    g.appendChild(card);
  });
  container.innerHTML='';container.appendChild(g);updateStats();
}
function setStar(ai,n){alunos[ai].nota=alunos[ai].nota===n?0:n;buildAlunos();salvar();}
function togChk(ai,ci){alunos[ai].checks[ci]=!alunos[ai].checks[ci];const el=document.getElementById('mc-'+ai+'-'+ci);if(el)el.classList.toggle('on');updateStats();salvar();}
function setStatus(ai,s){alunos[ai].status=alunos[ai].status===s?'pendente':s;buildAlunos();salvar();}
function saveNote(ai,v){alunos[ai].nota_txt=v;salvar();}
function addAluno(){const n=prompt('Nome do aluno:');if(!n||!n.trim())return;alunos.push({nome:n.trim(),iniciais:init(n),cor:alunos.length%CORES.length,nota:0,checks:new Array(CHECKS.length).fill(false),status:'pendente',nota_txt:''});buildAlunos();salvar();}
function excluirAluno(ai){if(!confirm(`Excluir "${alunos[ai].nome}"?`))return;alunos.splice(ai,1);buildAlunos();salvar();}
function updateStats(){document.getElementById('s-total').textContent=alunos.length;document.getElementById('s-pres').textContent=alunos.filter(a=>a.status==='concluido').length;const rated=alunos.filter(a=>a.nota>0);document.getElementById('s-med').innerHTML=rated.length?(rated.reduce((s,a)=>s+a.nota,0)/rated.length).toFixed(1)+'&#9733;':'&#8212;';document.getElementById('s-pontos').textContent=pontos.filter(p=>p.used).length;}
function buildPontos(){const el=document.getElementById('pontos');el.innerHTML='';pontos.forEach((p,i)=>{const d=document.createElement('div');d.className='pto'+(p.used?' used':'');d.onclick=()=>{p.used=!p.used;buildPontos();updateStats();salvar();};d.innerHTML=`<div class="pto-ic" style="background:${p.used?AC_LT:'#f1f5f9'};color:${p.used?AC:'#64748b'}">${p.used?'&#10003;':'?'}</div><div class="pto-tx">${p.t}</div><div class="pto-tag">${p.tag}</div>`;el.appendChild(d);});}
function addPonto(){const inp=document.getElementById('novo');const v=inp.value.trim();if(!v)return;pontos.push({t:v,tag:'custom',used:false});inp.value='';buildPontos();salvar();}
function startTimer(){const btn=document.getElementById('tbtn');if(!ticking){ticking=true;btn.textContent='Pausar';btn.className='tbtn act';tInterval=setInterval(()=>{tSec--;salvar();const m=Math.floor(tSec/60),s=tSec%60;const chip=document.getElementById('tchip');chip.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;if(tSec<=300)chip.style.color='#d97706';if(tSec<=60)chip.style.color='#dc2626';if(tSec<=0){clearInterval(tInterval);ticking=false;btn.textContent='Encerrado';btn.disabled=true;}},1000);}else{ticking=false;clearInterval(tInterval);btn.textContent='Continuar';btn.className='tbtn';}}
carregar();
const _m=Math.floor(tSec/60),_s=tSec%60;
document.getElementById('tchip').textContent=((_m<10?'0':'')+_m+':'+(_s<10?'0':'')+_s);
buildAlunos();buildPontos();
</script>
</body></html>
