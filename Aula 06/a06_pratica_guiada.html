<script>const STEPS=[
{title:"Conectar ao Atlas e criar banco loja_mongo",time:"10 min",
instrs:[
  "Acesse cloud.mongodb.com &rarr; crie conta gratuita &rarr; deploy M0 Free &rarr; AWS S&atilde;o Paulo",
  "Copie a Connection String e cole no MongoDB Compass em 'New Connection'",
  "No shell ou Compass execute: use loja_mongo",
  "Confirme: db.getName() deve retornar 'loja_mongo'"
],
code:`use loja_mongo\ndb.getName()        // 'loja_mongo'\ndb.getCollectionNames() // []`,
tip:"<strong>O banco s&oacute; &eacute; criado de verdade</strong> quando o primeiro documento for inserido. use loja_mongo apenas seleciona o banco — ele aparece na lista depois do primeiro insertOne."},
{title:"insertOne com embedding e array",time:"15 min",
instrs:[
  "Execute o insertOne e observe o _id gerado automaticamente",
  "No Compass: v&aacute; em loja_mongo &rarr; produtos &mdash; o documento aparece",
  "Clique no documento para ver o JSON completo",
  "Observe que categoria &eacute; um objeto embutido e tamanhos &eacute; um array &mdash; imposs&iacute;vel em uma coluna SQL"
],
code:`db.produtos.insertOne({\n  nome:      "Camiseta Azul",\n  preco:     49.90,\n  estoque:   100,\n  categoria: { nome: "Roupas", codigo: "ROU" },\n  tags:      ["algodao", "casual"],\n  tamanhos:  ["P", "M", "G", "GG"]\n})`,
tip:"<strong>Schema flex&iacute;vel:</strong> o MongoDB n&atilde;o exige que todos os documentos da mesma cole&ccedil;&atilde;o tenham os mesmos campos. O pr&oacute;ximo insertOne pode ter campos completamente diferentes."},
{title:"insertMany — 3 produtos com estruturas diferentes",time:"15 min",
instrs:[
  "Execute o insertMany — observe que cada produto tem uma estrutura diferente",
  "No Compass clique em Table View &mdash; campos ausentes aparecem como &mdash;",
  "Execute db.produtos.countDocuments() &mdash; deve retornar 4",
  "Observe que T&ecirc;nis tem campo 'numeracao' que Camiseta n&atilde;o tem"
],
code:`db.produtos.insertMany([\n  { nome: "Calca Jeans", preco: 129.90, estoque: 45,\n    categoria: { nome: "Roupas", codigo: "ROU" },\n    tamanhos: ["36","38","40","42"] },\n  { nome: "Tenis Branco", preco: 219.90, estoque: 30,\n    categoria: { nome: "Calcados", codigo: "CAL" },\n    numeracao: [38,39,40,41,42] },\n  { nome: "Bone Preto", preco: 39.90, estoque: 200,\n    categoria: { nome: "Acessorios", codigo: "ACE" },\n    ajuste: "snapback" }\n])`,
tip:"<strong>Table View no Compass</strong> mostra a heterogeneidade dos documentos. Em SQL isso exigiria NULL em todas as linhas e ALTER TABLE para cada novo campo. No MongoDB &eacute; nativo."},
{title:"find() com filtros e projeção",time:"15 min",
instrs:[
  "Execute cada find() separadamente e observe os resultados",
  "'categoria.nome' com aspas acessa campo de documento embutido",
  "Tente: db.produtos.find({ preco: { $gte: 40, $lte: 130 } })",
  "Tente: db.produtos.find({ tags: 'casual' }) &mdash; filtra por elemento de array"
],
code:`// Todos\ndb.produtos.find()\n\n// Preco > 50\ndb.produtos.find({ preco: { $gt: 50 } })\n\n// Campo embutido\ndb.produtos.find({ "categoria.nome": "Roupas" })\n\n// Projecao: so nome e preco\ndb.produtos.find({}, { nome: 1, preco: 1, _id: 0 })`,
tip:"<strong>Nota&ccedil;&atilde;o ponto</strong> 'categoria.nome' acessa campos de documentos embutidos. Operadores: $gt (&gt;), $gte (&gt;=), $lt (&lt;), $lte (&lt;=), $in (est&aacute; na lista), $ne (diferente)."},
{title:"updateOne com $set e $inc",time:"15 min",
instrs:[
  "Execute o updateOne e depois findOne para confirmar a mudan&ccedil;a",
  "$set atualiza s&oacute; os campos especificados &mdash; o resto fica intacto",
  "$inc incrementa: estoque de T&ecirc;nis foi de 30 para 50",
  "Tente sem $set (substitui&ccedil;&atilde;o direta) &mdash; o que acontece com os outros campos?"
],
code:`// Atualizar preco\ndb.produtos.updateOne(\n  { nome: "Camiseta Azul" },\n  { $set: { preco: 54.90, ativo: true } }\n)\n\n// Incrementar estoque\ndb.produtos.updateOne(\n  { nome: "Tenis Branco" },\n  { $inc: { estoque: 20 } }\n)\n\n// Confirmar\ndb.produtos.findOne({ nome: "Camiseta Azul" })`,
tip:"<strong>NUNCA fa&ccedil;a updateOne(filtro, novoDoc)</strong> sem operadores &mdash; isso substitui o documento inteiro, apagando todos os outros campos. Sempre use $set, $inc, $push ou outros operadores para atualiza&ccedil;&otilde;es parciais."},
{title:"deleteOne, sort e limit",time:"15 min",
instrs:[
  "Execute deleteOne e confirme com countDocuments",
  "sort({ preco: 1 }) = ORDER BY preco ASC",
  "sort({ preco: -1 }).limit(2) = ORDER BY preco DESC LIMIT 2",
  "Combine: db.produtos.find({'categoria.nome':'Roupas'}).sort({preco:-1})"
],
code:`// Deletar\ndb.produtos.deleteOne({ nome: "Bone Preto" })\ndb.produtos.countDocuments() // 3\n\n// Ordenar crescente\ndb.produtos.find().sort({ preco: 1 })\n\n// Top 2 mais caros\ndb.produtos.find().sort({ preco: -1 }).limit(2)\n\n// Combinar filtro + sort\ndb.produtos.find(\n  { "categoria.nome": "Roupas" },\n  { nome: 1, preco: 1, _id: 0 }\n).sort({ preco: -1 })`,
tip:"<strong>Cuidado com deleteMany({})!</strong> Sem filtro, remove TODOS os documentos. Equivale a DELETE FROM tabela sem WHERE. Sempre teste o filtro com find() antes de deletar."}
];</script>
<script>

function build(){

    const card=document.createElement('div');
    card.className='sc'+(i===0?' open-c':'');

    let gab='';
    if(s.code){
      gab=`<div class="gab-wrap">
        <button class="gab-btn" id="gbtn-${i}" onclick="togGab(${i})">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Ver gabarito <span class="arr">&#9662;</span>
        </button>
        <div class="gab-body" id="gab-${i}">
          <div class="cw" style="margin-top:7px">
            <div class="ch2"><span>Gabarito</span><div class="cdd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div>
            <pre>${s.code}</pre>
          </div>
        </div>
      </div>`;
    }
    card.innerHTML=`<div class="sh" onclick="tog(${i})">
      <div class="chk" id="chk-${i}" onclick="event.stopPropagation();mk(${i})">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="si"><div class="sn2">Passo ${i+1} de ${STEPS.length}</div><div class="st">${s.title}</div><div class="stm">${s.time}</div></div>
      <span class="cv">${i===0?'&#9650;':'&#9660;'}</span>
    </div>
    <div class="sb"><div class="sbi">
      <div class="il">${s.instrs.map((t,j)=>`<div class="ii"><div class="in">${j+1}</div><span>${t}</span></div>`).join('')}</div>
      ${gab}
      <div class="tip">${s.tip}</div>
      <button class="mb" id="mb-${i}" onclick="mk(${i})">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Marcar como conclui&#769;do
      </button>
    </div></div>`;
    list.appendChild(card);
  });
}
function togGab(i){
  document.getElementById('gbtn-'+i).classList.toggle('open');
  document.getElementById('gab-'+i).classList.toggle('open');
}
function tog(i){
  const c=document.getElementById('sc-'+i);
  const o=c.classList.contains('open-c');
  document.querySelectorAll('.sc').forEach(x=>{x.classList.remove('open-c');x.querySelector('.cv').innerHTML='&#9660;';});
  if(!o){c.classList.add('open-c');c.querySelector('.cv').innerHTML='&#9650;';}
}
function mk(i){
  if(done.has(i))return;
  done.add(i);
  document.getElementById('chk-'+i).classList.add('done');
  document.getElementById('sc-'+i).classList.add('done-c');
  const mb=document.getElementById('mb-'+i);
  mb.classList.add('done-btn');
  mb.innerHTML='<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Conclu&#237;do!';
  upd();
  if(i<STEPS.length-1){
    document.querySelectorAll('.sc').forEach(x=>{x.classList.remove('open-c');x.querySelector('.cv').innerHTML='&#9660;';});
    const nx=document.getElementById('sc-'+(i+1));
    nx.classList.add('open-c');nx.querySelector('.cv').innerHTML='&#9650;';
    setTimeout(()=>nx.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
  }
  if(done.size===STEPS.length)document.getElementById('success-el').classList.add('show');
}
function upd(){
  document.getElementById('pf').style.width=Math.round((done.size/STEPS.length)*100)+'%';
  document.getElementById('pt').textContent=done.size+' / '+STEPS.length;
}
build();upd();
</script>
</body></html>
