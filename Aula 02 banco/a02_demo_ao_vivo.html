<script>
const STEPS=[
{label:"Criar banco e tabela categoria",
narr:"<strong>Docente:</strong> \"Abrimos o DER da aula 1. Primeira entidade: Categoria. id_categoria é o atributo sublinhado — vira INT AUTO_INCREMENT PRIMARY KEY. Nome é NOT NULL. Descricao é opcional — sem NOT NULL.\"",
code:`<span class="c">-- Criar e selecionar o banco</span>
<span class="k">CREATE DATABASE</span> loja;
<span class="k">USE</span> loja;

<span class="c">-- DER: CATEGORIA (id_categoria PK, nome, descricao)</span>
<span class="k">CREATE TABLE</span> categoria (
  id_categoria  <span class="p">INT</span>           <span class="v">AUTO_INCREMENT PRIMARY KEY</span>,
  nome          <span class="p">VARCHAR</span>(<span class="s">80</span>)  <span class="v">NOT NULL</span>,
  descricao     <span class="p">VARCHAR</span>(<span class="s">255</span>)
);`,
prev:`<div style="font-family:system-ui;padding:14px"><div class="der-ref"><strong>DER de origem (Aula 1)</strong>CATEGORIA: <u>id_categoria</u>, nome, descricao<br>Relacionamento: CATEGORIA (1) ──► PRODUTO (N)</div><div style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:10px;font-size:13px;color:#15803d"><strong>✅ Banco loja criado · Tabela categoria criada</strong></div></div>`},
{label:"Criar tabela produto com FOREIGN KEY",
narr:"<strong>Docente:</strong> \"Produto é o lado N do relacionamento 1:N com Categoria. Por isso a FK fica aqui. id_categoria INT NOT NULL + FOREIGN KEY declarada. ON DELETE RESTRICT: se tentar deletar uma categoria com produtos, o banco recusa.\"",
code:`<span class="c">-- DER: PRODUTO (id_produto PK, nome, preco, estoque)</span>
<span class="c">-- DER: relação 1:N com CATEGORIA → FK em produto</span>
<span class="k">CREATE TABLE</span> produto (
  id_produto    <span class="p">INT</span>           <span class="v">AUTO_INCREMENT PRIMARY KEY</span>,
  id_categoria  <span class="p">INT</span>           <span class="v">NOT NULL</span>,
  nome          <span class="p">VARCHAR</span>(<span class="s">100</span>)  <span class="v">NOT NULL</span>,
  preco         <span class="p">DECIMAL</span>(<span class="s">10,2</span>) <span class="v">NOT NULL</span>,
  estoque       <span class="p">INT</span>           <span class="v">DEFAULT 0</span>,

  <span class="v">FOREIGN KEY</span> (id_categoria)
    <span class="v">REFERENCES</span> categoria(id_categoria)
    <span class="v">ON DELETE RESTRICT</span>
);`,
prev:`<div style="font-family:system-ui;padding:14px"><div class="der-ref"><strong>Regra aplicada</strong>Relacionamento 1:N → FK na tabela do lado N<br>Categoria (1) ──► Produto (N) → id_categoria fica em produto</div><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr><th style="background:#1565C0;color:#fff;padding:6px 10px;text-align:left">Coluna</th><th style="background:#1565C0;color:#fff;padding:6px 10px;text-align:left">Tipo</th><th style="background:#1565C0;color:#fff;padding:6px 10px;text-align:left">Papel no DER</th></tr></thead><tbody><tr><td style="padding:6px 10px;border-bottom:1px solid #e2e8f0;color:#f59e0b;font-weight:700">🔑 id_produto</td><td style="padding:6px 10px;border-bottom:1px solid #e2e8f0">INT AUTO_INCREMENT</td><td style="padding:6px 10px;border-bottom:1px solid #e2e8f0;font-size:11px;color:#94a3b8">PK (atributo sublinhado)</td></tr><tr style="background:#f8fafc"><td style="padding:6px 10px;border-bottom:1px solid #e2e8f0;color:#1565C0;font-weight:700">🔗 id_categoria</td><td style="padding:6px 10px;border-bottom:1px solid #e2e8f0">INT NOT NULL</td><td style="padding:6px 10px;border-bottom:1px solid #e2e8f0;font-size:11px;color:#94a3b8">FK — relacionamento 1:N</td></tr><tr><td style="padding:6px 10px;border-bottom:1px solid #e2e8f0">nome</td><td style="padding:6px 10px;border-bottom:1px solid #e2e8f0">VARCHAR(100)</td><td style="padding:6px 10px;border-bottom:1px solid #e2e8f0;font-size:11px;color:#94a3b8">Atributo NOT NULL</td></tr><tr style="background:#f8fafc"><td style="padding:6px 10px;border-bottom:1px solid #e2e8f0">preco</td><td style="padding:6px 10px;border-bottom:1px solid #e2e8f0">DECIMAL(10,2)</td><td style="padding:6px 10px;border-bottom:1px solid #e2e8f0;font-size:11px;color:#94a3b8">Atributo numérico</td></tr><tr><td style="padding:6px 10px">estoque</td><td style="padding:6px 10px">INT</td><td style="padding:6px 10px;font-size:11px;color:#94a3b8">Atributo com DEFAULT</td></tr></tbody></table></div>`},
{label:"Criar tabela cliente",
narr:"<strong>Docente:</strong> \"Cliente não tem FK para nenhuma tabela ainda — no modelo simplificado da aula 1 é uma entidade independente. Email tem UNIQUE: dois clientes não podem usar o mesmo. Telefone é opcional.\"",
code:`<span class="c">-- DER: CLIENTE (id_cliente PK, nome, email, telefone)</span>
<span class="k">CREATE TABLE</span> cliente (
  id_cliente  <span class="p">INT</span>           <span class="v">AUTO_INCREMENT PRIMARY KEY</span>,
  nome        <span class="p">VARCHAR</span>(<span class="s">120</span>)  <span class="v">NOT NULL</span>,
  email       <span class="p">VARCHAR</span>(<span class="s">120</span>)  <span class="v">UNIQUE NOT NULL</span>,
  telefone    <span class="p">VARCHAR</span>(<span class="s">20</span>)
);`,
prev:`<div style="font-family:system-ui;padding:14px"><div class="der-ref"><strong>3 tabelas criadas — banco loja</strong>categoria → produto (1:N via FK) · cliente (independente)</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"><div style="border:1.5px solid #1565C0;border-radius:5px;overflow:hidden;min-width:110px"><div style="background:#1565C0;color:#fff;font-size:11px;font-weight:700;padding:4px 9px;text-align:center">categoria</div><div style="padding:5px 9px;font-family:monospace;font-size:11px;color:#475569;line-height:1.9"><span style="color:#f59e0b;font-weight:700">🔑 id_categoria</span><br>nome<br>descricao</div></div><div style="align-self:center;color:#1565C0;font-size:13px">1──►N</div><div style="border:1.5px solid #1565C0;border-radius:5px;overflow:hidden;min-width:110px"><div style="background:#1565C0;color:#fff;font-size:11px;font-weight:700;padding:4px 9px;text-align:center">produto</div><div style="padding:5px 9px;font-family:monospace;font-size:11px;color:#475569;line-height:1.9"><span style="color:#f59e0b;font-weight:700">🔑 id_produto</span><br><span style="color:#1565C0;font-weight:700">🔗 id_categoria</span><br>nome<br>preco</div></div><div style="border:1.5px solid #1565C0;border-radius:5px;overflow:hidden;min-width:110px;margin-left:10px"><div style="background:#1565C0;color:#fff;font-size:11px;font-weight:700;padding:4px 9px;text-align:center">cliente</div><div style="padding:5px 9px;font-family:monospace;font-size:11px;color:#475569;line-height:1.9"><span style="color:#f59e0b;font-weight:700">🔑 id_cliente</span><br>nome<br>email<br>telefone</div></div></div></div>`},
{label:"Inserir dados na ordem correta",
narr:"<strong>Docente:</strong> \"Inserimos categorias primeiro — são o pai. Depois produtos referenciando as PKs das categorias. Se tentarmos inserir um produto com id_categoria = 99, o banco recusa porque 99 não existe.\"",
code:`<span class="c">-- Pai primeiro: categorias</span>
<span class="k">INSERT INTO</span> categoria (nome) <span class="k">VALUES</span>
  (<span class="s">'Roupas'</span>),
  (<span class="s">'Calçados'</span>),
  (<span class="s">'Acessórios'</span>);

<span class="c">-- Filho depois: produtos com id_categoria válido</span>
<span class="k">INSERT INTO</span> produto (id_categoria, nome, preco, estoque)
<span class="k">VALUES</span>
  (<span class="v">1</span>, <span class="s">'Camiseta Azul'</span>,   <span class="v">49.90</span>,  <span class="v">100</span>),
  (<span class="v">1</span>, <span class="s">'Calça Jeans'</span>,    <span class="v">129.90</span>,  <span class="v">45</span>),
  (<span class="v">2</span>, <span class="s">'Tênis Branco'</span>,  <span class="v">219.90</span>,  <span class="v">30</span>);`,
prev:`<div style="font-family:system-ui;padding:14px"><table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px"><caption style="text-align:left;font-size:11px;color:#94a3b8;margin-bottom:4px">categoria</caption><thead><tr><th style="background:#1565C0;color:#fff;padding:5px 9px;text-align:left">id</th><th style="background:#1565C0;color:#fff;padding:5px 9px;text-align:left">nome</th></tr></thead><tbody><tr><td style="padding:5px 9px;border-bottom:1px solid #e2e8f0">1</td><td style="padding:5px 9px;border-bottom:1px solid #e2e8f0">Roupas</td></tr><tr style="background:#f8fafc"><td style="padding:5px 9px;border-bottom:1px solid #e2e8f0">2</td><td style="padding:5px 9px;border-bottom:1px solid #e2e8f0">Calçados</td></tr><tr><td style="padding:5px 9px">3</td><td style="padding:5px 9px">Acessórios</td></tr></tbody></table><table style="width:100%;border-collapse:collapse;font-size:12px"><caption style="text-align:left;font-size:11px;color:#94a3b8;margin-bottom:4px">produto</caption><thead><tr><th style="background:#1565C0;color:#fff;padding:5px 9px;text-align:left">id</th><th style="background:#1565C0;color:#fff;padding:5px 9px;text-align:left">id_cat</th><th style="background:#1565C0;color:#fff;padding:5px 9px;text-align:left">nome</th><th style="background:#1565C0;color:#fff;padding:5px 9px;text-align:left">preco</th></tr></thead><tbody><tr><td style="padding:5px 9px;border-bottom:1px solid #e2e8f0">1</td><td style="padding:5px 9px;border-bottom:1px solid #e2e8f0">1</td><td style="padding:5px 9px;border-bottom:1px solid #e2e8f0">Camiseta Azul</td><td style="padding:5px 9px;border-bottom:1px solid #e2e8f0">49.90</td></tr><tr style="background:#f8fafc"><td style="padding:5px 9px;border-bottom:1px solid #e2e8f0">2</td><td style="padding:5px 9px;border-bottom:1px solid #e2e8f0">1</td><td style="padding:5px 9px;border-bottom:1px solid #e2e8f0">Calça Jeans</td><td style="padding:5px 9px;border-bottom:1px solid #e2e8f0">129.90</td></tr><tr><td style="padding:5px 9px">3</td><td style="padding:5px 9px">2</td><td style="padding:5px 9px">Tênis Branco</td><td style="padding:5px 9px">219.90</td></tr></tbody></table></div>`},
{label:"SELECT, WHERE e ORDER BY",
narr:"<strong>Docente:</strong> \"Com dados inseridos, consultamos. SELECT traz os registros. WHERE filtra. ORDER BY ordena. O Workbench mostra o resultado em grade no painel inferior — Ctrl+Enter executa a linha onde o cursor está.\"",
code:`<span class="c">-- Todos os produtos</span>
<span class="k">SELECT</span> * <span class="k">FROM</span> produto;

<span class="c">-- Filtrar por categoria 1 (Roupas)</span>
<span class="k">SELECT</span> nome, preco <span class="k">FROM</span> produto
<span class="k">WHERE</span> id_categoria = <span class="v">1</span>;

<span class="c">-- Ordenar por preço</span>
<span class="k">SELECT</span> * <span class="k">FROM</span> produto
<span class="k">ORDER BY</span> preco <span class="v">ASC</span>;

<span class="c">-- Testar integridade: produto com categoria inexistente</span>
<span class="k">INSERT INTO</span> produto (id_categoria, nome, preco)
<span class="k">VALUES</span> (<span class="v">99</span>, <span class="s">'Teste'</span>, <span class="v">0</span>);
<span class="c">-- Error 1452: Cannot add or update a child row</span>`,
prev:`<div style="font-family:system-ui;padding:14px"><p style="font-size:12px;color:#64748b;margin-bottom:8px">SELECT * FROM produto WHERE id_categoria = 1</p><table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px"><thead><tr><th style="background:#1565C0;color:#fff;padding:5px 9px;text-align:left">nome</th><th style="background:#1565C0;color:#fff;padding:5px 9px;text-align:left">preco</th></tr></thead><tbody><tr><td style="padding:5px 9px;border-bottom:1px solid #e2e8f0">Camiseta Azul</td><td style="padding:5px 9px;border-bottom:1px solid #e2e8f0">49.90</td></tr><tr style="background:#f8fafc"><td style="padding:5px 9px">Calça Jeans</td><td style="padding:5px 9px">129.90</td></tr></tbody></table><div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:9px;font-size:12px;color:#991b1b">❌ Error 1452 — Cannot add or update a child row: id_categoria=99 não existe em categoria.</div></div>`},
{label:"Gerar diagrama EER no Workbench",
narr:"<strong>Docente:</strong> \"Agora a mágica: o Workbench lê as FKs que criamos e gera o diagrama EER automaticamente — igual ao DER que fizemos no draw.io na Aula 1, mas no formato crow's foot. Database → Reverse Engineer.\"",
code:`<span class="c">-- Verificar FKs declaradas (para conferir antes do EER)</span>
<span class="k">SELECT</span>
  TABLE_NAME            <span class="k">AS</span> tabela,
  COLUMN_NAME           <span class="k">AS</span> fk_coluna,
  REFERENCED_TABLE_NAME <span class="k">AS</span> referencia
<span class="k">FROM</span> INFORMATION_SCHEMA.KEY_COLUMN_USAGE
<span class="k">WHERE</span>
  TABLE_SCHEMA = <span class="s">'loja'</span>
  <span class="k">AND</span> REFERENCED_TABLE_NAME <span class="k">IS NOT NULL</span>;

<span class="c">-- Depois: Database → Reverse Engineer → selecione 'loja'</span>`,
prev:`<div style="font-family:system-ui;padding:14px"><div style="background:#e3f2fd;border-left:3px solid #1565C0;padding:9px 12px;font-size:12px;color:#0d3c6e;margin-bottom:10px"><strong>Workbench → Database → Reverse Engineer</strong><br>Selecione schema "loja" → Execute → Finish → o EER aparece!</div><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr><th style="background:#1565C0;color:#fff;padding:5px 9px;text-align:left">tabela</th><th style="background:#1565C0;color:#fff;padding:5px 9px;text-align:left">fk_coluna</th><th style="background:#1565C0;color:#fff;padding:5px 9px;text-align:left">referencia</th></tr></thead><tbody><tr><td style="padding:5px 9px">produto</td><td style="padding:5px 9px;color:#1565C0;font-weight:600">id_categoria</td><td style="padding:5px 9px">categoria</td></tr></tbody></table></div>`},
{label:"DER × EER — ciclo completo",
narr:"<strong>Docente:</strong> \"Fechamos o ciclo: desenhamos o DER no draw.io na Aula 1, traduzimos para SQL agora, e o Workbench gerou o EER que é equivalente ao DER original. Na prática guiada vocês repetem esse processo completos.\"",
code:`<span class="c">-- Ciclo completo da Aula 1 → Aula 2</span>

<span class="c">-- draw.io (Aula 1):</span>
<span class="c">-- CATEGORIA (1) ──────────── PRODUTO (N)</span>
<span class="c">--   id_categoria    tem     id_produto</span>
<span class="c">--   nome                    id_categoria ← FK</span>

<span class="c">-- SQL (Aula 2):</span>
<span class="k">CREATE TABLE</span> categoria ( id_categoria <span class="p">INT PK</span> ... );
<span class="k">CREATE TABLE</span> produto (
  id_produto   <span class="p">INT PK</span>,
  id_categoria <span class="p">INT FK</span> → categoria,
  ...
