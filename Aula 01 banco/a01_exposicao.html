<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exposição — Conceitos de BD e Modelagem · Aula 01</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;gap:8px;flex-wrap:wrap;min-height:52px}
.badge{background:#1565C0;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-title{font-size:14px;font-weight:600}
.hdr-sub{font-size:12px;color:#94a3b8;margin-top:1px}
.timer{font-size:13px;font-weight:500;background:#f1f5f9;padding:5px 14px;border-radius:8px;border:1px solid #e2e8f0;font-family:monospace;color:#475569;min-width:64px;text-align:center}
.timer.warn{color:#d97706;background:#fffbeb}.timer.danger{color:#dc2626;background:#fef2f2}
.dots{display:flex;align-items:center;gap:5px;padding:9px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;overflow-x:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:#1565C0;transform:scale(1.4)}.dot.done{background:#1976D2;opacity:.5}
.dsep{width:10px;height:1px;background:#e2e8f0;flex-shrink:0}
.slide-area{flex:1;overflow-y:auto;padding:22px 28px}
.slide{display:none}.slide.active{display:block;animation:sIn .22s ease}
@keyframes sIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ey{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#1565C0;margin-bottom:5px}
.stitle{font-size:21px;font-weight:600;color:#1e293b;line-height:1.2;margin-bottom:5px}
.ssub{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px}
.card.ac{border-left:3px solid #1565C0}
.ci{font-size:18px;margin-bottom:5px}.ct{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.cb{font-size:12px;color:#64748b;line-height:1.5}
.hl{background:#e3f2fd;border-left:3px solid #1565C0;padding:10px 13px;font-size:12.5px;color:#0d3c6e;line-height:1.55;margin:10px 0}
.hl strong{color:#1565C0;font-weight:600}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:580px){.two-col{grid-template-columns:1fr}}
.box{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.box-h{padding:8px 13px;font-size:12px;font-weight:600}
.box-b{padding:10px 13px;font-size:12px;color:#64748b;line-height:1.7}
.ent-row{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;justify-content:center;margin:14px 0}
.ent-box{border:2px solid #1565C0;min-width:140px;background:#fff;text-align:left}
.ent-name{background:#1565C0;color:#fff;font-size:12px;font-weight:700;padding:6px 12px;text-align:center;text-transform:uppercase;letter-spacing:.05em}
.ent-attrs{padding:7px 12px;font-size:11.5px;color:#475569;line-height:2;font-family:monospace}
.ent-pk{color:#f59e0b;font-weight:700}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
@media(max-width:560px){.card-grid{grid-template-columns:1fr}}
.card-cell{border:1px solid #e2e8f0;border-radius:9px;padding:11px 13px;background:#fff}
.card-cell h4{font-size:12px;font-weight:600;color:#1565C0;margin-bottom:8px}
.card-cell ul{padding-left:0;list-style:none;display:flex;flex-direction:column;gap:5px}
.card-cell li{font-size:12px;color:#475569;line-height:1.5;display:flex;align-items:flex-start;gap:8px}
.tag{display:inline-block;font-family:monospace;font-size:10px;background:#f1f5f9;border:1px solid #e2e8f0;padding:1px 5px;border-radius:3px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.uml-wrap{overflow-x:auto;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px;margin:10px 0}
.uml{display:flex;align-items:center;justify-content:center;flex-wrap:nowrap;min-width:380px}
.uml-ent{border:2px solid #1565C0;background:#fff;min-width:110px}
.uml-h{background:#1565C0;color:#fff;font-size:11px;font-weight:700;padding:5px 10px;text-align:center;text-transform:uppercase}
.uml-b{padding:6px 10px;font-size:11px;color:#475569;line-height:1.9;font-family:monospace}
.uml-pk{color:#f59e0b;font-weight:700}
.uml-rel{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:80px;gap:3px}
.qb{margin-bottom:16px}
.qa{font-size:13.5px;font-weight:600;color:#1e293b;margin-bottom:11px;line-height:1.5}
.qo{display:flex;flex-direction:column;gap:7px}
.qop{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:9px;transition:all .15s;color:#1e293b}
.qop:hover:not(.correct):not(.wrong):not(.dimmed){border-color:#1976D2;background:#e3f2fd}
.qop.correct{background:#f0fdf4;border-color:#86efac;color:#15803d;pointer-events:none}
.qop.wrong{background:#fef2f2;border-color:#fca5a5;color:#dc2626;pointer-events:none}
.qop.dimmed{opacity:.4;pointer-events:none}
.qfb{margin-top:9px;padding:9px 13px;border-radius:8px;font-size:12.5px;line-height:1.5;display:none}
.rl{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ri{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px}
.rn{width:23px;height:23px;min-width:23px;border-radius:6px;background:#bbdefb;color:#1565C0;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rt{font-size:13px;color:#64748b;line-height:1.55}.rt strong{color:#1e293b;font-weight:600}
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.nb{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:7px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:#e2e8f0}.nb.pr{background:#1565C0;color:#fff;border-color:#1565C0}.nb.pr:hover{background:#0d47a1}
.nb:disabled{opacity:.35;pointer-events:none}
.nc{font-size:12px;color:#94a3b8}
.kz-footer{height:32px;background:#1e293b;display:flex;align-items:center;justify-content:center;gap:10px;flex-shrink:0}
.kz-footer a{color:#90caf9;font-size:11px;font-weight:600;text-decoration:none;letter-spacing:.03em;display:flex;align-items:center;gap:5px}
.kz-footer a:hover{color:#bbdefb}.kz-footer span{color:#475569;font-size:11px}
.next-stage{font-size:12px;font-weight:600;background:#fff;border:1.5px solid #1565C0;color:#1565C0;padding:5px 13px;border-radius:8px;cursor:pointer;font-family:inherit;transition:background .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.next-stage:hover{background:#e3f2fd}
</style>
</head>

<script>
var cur=0,timerStarted=false,timerInterval=null;
var SLIDES=[
function(){return '<div class="ey">Abertura · 3 min</div><div class="stitle">Antes de digitar qualquer SQL — precisamos pensar</div><div class="ssub">Todo banco de dados começa no papel. Antes de criar uma tabela sequer, precisamos modelar: quais entidades existem, quais atributos cada uma tem e como elas se relacionam entre si.</div><div class="cards"><div class="card ac"><div class="ci">🗺️</div><div class="ct">Modelar primeiro</div><div class="cb">Um modelo bem feito no papel economiza horas de refatoração. Mudar um diagrama é grátis; mudar um banco com dados é caro.</div></div><div class="card ac"><div class="ci">🔗</div><div class="ct">O que é um DER</div><div class="cb">Diagrama de Entidade-Relacionamento: linguagem visual para representar os dados e suas conexões antes de escrever SQL.</div></div><div class="card"><div class="ci">💬</div><div class="ct">Pergunta de abertura</div><div class="cb"><em>"Se você fosse criar um sistema para uma loja, quais coisas precisaria guardar? Liste no papel em 1 minuto."</em></div></div><div class="card"><div class="ci">🎯</div><div class="ct">O que veremos hoje</div><div class="cb">Conceitos de BD e SGBD, entidades, atributos, relacionamentos, cardinalidade, notação UML e crow\'s foot.</div></div></div>';},
function(){return '<div class="ey">Conceito · 4 min</div><div class="stitle">Banco de dados e SGBD</div><div class="ssub">Banco de dados é a coleção organizada de dados. SGBD é o software que gerencia essa coleção — é o intermediário entre você e os dados.</div><div class="two-col"><div class="box"><div class="box-h" style="background:#fef2f2;color:#991b1b">❌ Sem SGBD (planilha)</div><div class="box-b"><ul style="padding-left:16px;display:flex;flex-direction:column;gap:4px"><li>Difícil acesso simultâneo</li><li>Sem controle de permissão por usuário</li><li>Inconsistências fáceis de ocorrer</li><li>Não escala para milhões de registros</li></ul></div></div><div class="box"><div class="box-h" style="background:#f0fdf4;color:#15803d">✅ Com SGBD (MySQL)</div><div class="box-b"><ul style="padding-left:16px;display:flex;flex-direction:column;gap:4px"><li>Múltiplos usuários simultâneos</li><li>Controle de acesso granular</li><li>Integridade dos dados garantida</li><li>Escala para bilhões de registros</li></ul></div></div></div><div class="hl"><strong>Neste curso:</strong> MySQL é o SGBD (motor). Workbench é o cliente visual que se conecta ao MySQL. Você digita no Workbench, o MySQL executa e devolve o resultado.</div><div class="cards" style="margin-top:10px"><div class="card ac"><div class="ct">📊 Banco Relacional</div><div class="cb">Dados em tabelas com linhas e colunas. Relacionamentos via chaves. Consultas em SQL. Ex: MySQL, PostgreSQL.</div></div><div class="card ac"><div class="ct">📄 Banco NoSQL</div><div class="cb">Documentos JSON, chave-valor ou grafos. Schema flexível. Ex: MongoDB. Veremos nas aulas 4 e 5.</div></div></div>';},
function(){return '<div class="ey">Modelagem · 5 min</div><div class="stitle">Entidades e atributos</div><div class="ssub">Entidade é qualquer "coisa" do mundo real que precisa ser armazenada. Atributo é uma propriedade ou característica dessa entidade.</div><div class="ent-row"><div style="text-align:center"><div style="font-size:10px;color:#94a3b8;margin-bottom:6px;font-weight:600;letter-spacing:.05em">ENTIDADE</div><div class="ent-box"><div class="ent-name">Produto</div><div class="ent-attrs"><span class="ent-pk">🔑 id_produto</span><br>nome<br>preco<br>estoque</div></div></div><div style="text-align:center"><div style="font-size:10px;color:#94a3b8;margin-bottom:6px;font-weight:600;letter-spacing:.05em">ENTIDADE</div><div class="ent-box"><div class="ent-name">Cliente</div><div class="ent-attrs"><span class="ent-pk">🔑 id_cliente</span><br>nome<br>email<br>telefone</div></div></div><div style="text-align:center"><div style="font-size:10px;color:#94a3b8;margin-bottom:6px;font-weight:600;letter-spacing:.05em">ENTIDADE</div><div class="ent-box"><div class="ent-name">Categoria</div><div class="ent-attrs"><span class="ent-pk">🔑 id_categoria</span><br>nome<br>descricao</div></div></div></div><div class="cards"><div class="card ac"><div class="ct">📦 Entidade</div><div class="cb">Representada por retângulo. Nome no singular e em maiúsculas: PRODUTO, CLIENTE, CATEGORIA.</div></div><div class="card ac"><div class="ct">📋 Atributo</div><div class="cb">Característica da entidade. Cada atributo tem nome e tipo (texto, número, data).</div></div><div class="card ac"><div class="ct">🔑 Chave primária</div><div class="cb">Atributo que identifica unicamente cada registro. Sublinhado no modelo clássico; ícone 🔑 nos diagramas modernos.</div></div></div>';},
function(){return '<div class="ey">Modelagem · 4 min</div><div class="stitle">Relacionamentos</div><div class="ssub">Relacionamento é a associação entre duas entidades. No diagrama, uma linha conecta as entidades e um verbo nomeia a associação.</div><div class="uml-wrap"><div class="uml"><div class="uml-ent"><div class="uml-h">Categoria</div><div class="uml-b"><span class="uml-pk">🔑 id</span><br>nome</div></div><div class="uml-rel"><div style="font-size:11px;font-weight:600;color:#1565C0;background:#bbdefb;padding:2px 7px;border-radius:8px">tem</div><div style="width:100%;height:2px;background:#94a3b8"></div></div><div class="uml-ent"><div class="uml-h">Produto</div><div class="uml-b"><span class="uml-pk">🔑 id</span><br>nome<br>preco</div></div><div class="uml-rel"><div style="font-size:11px;font-weight:600;color:#1565C0;background:#bbdefb;padding:2px 7px;border-radius:8px">compra</div><div style="width:100%;height:2px;background:#94a3b8"></div></div><div class="uml-ent"><div class="uml-h">Cliente</div><div class="uml-b"><span class="uml-pk">🔑 id</span><br>nome<br>email</div></div></div></div><div class="cards"><div class="card ac"><div class="ct">➡️ Nomear com verbo</div><div class="cb">Use um verbo que descreve a associação: "tem", "pertence a", "realiza", "contém". Leia como frase: "Categoria <em>tem</em> Produto".</div></div><div class="card ac"><div class="ct">↔️ Leitura dupla</div><div class="cb">Todo relacionamento se lê nos dois sentidos: "Categoria tem Produto" e "Produto pertence a Categoria".</div></div><div class="card"><div class="ct">⚠️ Ainda não é FK</div><div class="cb">No DER, o relacionamento é conceitual. A chave estrangeira só aparece na implementação SQL — aula 2.</div></div></div>';},
function(){return '<div class="ey">Cardinalidade · 5 min</div><div class="stitle">Cardinalidade — quantos para quantos?</div><div class="ssub">Cardinalidade define quantos registros de uma entidade podem se relacionar com quantos da outra. É a decisão mais importante do modelo.</div><div class="card-grid"><div class="card-cell"><h4>1 : 1 — Um para Um</h4><ul><li><span class="tag">Ex</span>Pessoa ↔ CNH</li><li><span class="tag">Regra</span>Um A corresponde a exatamente um B</li><li><span class="tag">Raro</span>Geralmente indica que as entidades poderiam ser uma só</li></ul></div><div class="card-cell"><h4>1 : N — Um para Muitos</h4><ul><li><span class="tag">Ex</span>Categoria → Produtos</li><li><span class="tag">Regra</span>Um A se relaciona com muitos B, mas cada B com apenas um A</li><li><span class="tag">Mais comum</span>Implementado com FK na tabela do lado N</li></ul></div><div class="card-cell"><h4>N : M — Muitos para Muitos</h4><ul><li><span class="tag">Ex</span>Pedido ↔ Produto</li><li><span class="tag">Regra</span>Muitos A com muitos B e vice-versa</li><li><span class="tag">Atenção</span>Precisa de tabela associativa na implementação SQL</li></ul></div><div class="card-cell"><h4>Como descobrir a cardinalidade</h4><ul><li><span class="tag">Passo 1</span>"Quantos B um A pode ter?"</li><li><span class="tag">Passo 2</span>"Quantos A um B pode ter?"</li><li><span class="tag">Ex</span>"Uma Categoria pode ter N Produtos. Um Produto pertence a 1 Categoria." → 1:N</li></ul></div></div><div class="hl"><strong>Exercício mental:</strong> para cada relacionamento, faça as duas perguntas. As respostas formam a cardinalidade. Pratique com: Cliente ↔ Pedido.</div>';},
function(){return '<div class="ey">Notação · 5 min</div><div class="stitle">Notação UML — números nas pontas</div><div class="ssub">Na notação UML clássica, a cardinalidade é escrita como números ou expressões nas pontas da linha de relacionamento.</div><div class="uml-wrap"><div class="uml"><div class="uml-ent"><div class="uml-h">Categoria</div><div class="uml-b"><span class="uml-pk">🔑 id</span><br>nome</div></div><div class="uml-rel"><span style="font-size:14px;font-weight:700;color:#1565C0">1</span><div style="width:100%;height:2px;background:#94a3b8"></div><span style="font-size:14px;font-weight:700;color:#1565C0">*</span></div><div class="uml-ent"><div class="uml-h">Produto</div><div class="uml-b"><span class="uml-pk">🔑 id</span><br>nome</div></div></div></div><p style="font-size:12px;color:#64748b;text-align:center;margin:-4px 0 10px">Uma Categoria tem N Produtos · Um Produto pertence a 1 Categoria</p><div class="card-grid"><div class="card-cell"><h4>Símbolos UML</h4><ul><li><span class="tag">1</span>Exatamente um (obrigatório)</li><li><span class="tag">0..1</span>Zero ou um (opcional)</li><li><span class="tag">*</span>Zero ou muitos</li><li><span class="tag">1..*</span>Um ou muitos (obrigatório)</li></ul></div><div class="card-cell"><h4>Posição dos números</h4><ul><li><span class="tag">Regra</span>O número fica próximo à entidade que ele descreve</li><li><span class="tag">Ex</span>"1" perto de Categoria = existe uma categoria</li><li><span class="tag">Ex</span>"*" perto de Produto = existem muitos produtos</li></ul></div></div><div class="hl"><strong>No draw.io:</strong> use a forma "Entity" ou caixas simples. Adicione o rótulo de cardinalidade clicando na linha e editando as propriedades de "Connection Label" nas pontas.</div>';},
function(){return '<div class="ey">Notação · 5 min</div><div class="stitle">Crow\'s Foot — a notação visual do mercado</div><div class="ssub">A notação crow\'s foot (pé de galho) usa símbolos visuais nas pontas da linha. É usada no Workbench, Lucidchart e dbdiagram.io — mais fácil de ler em modelos grandes.</div><svg viewBox="0 0 600 230" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:600px;display:block;margin:10px auto;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px"><text x="22" y="26" font-size="11" font-weight="700" fill="#1565C0" font-family="system-ui">Símbolo</text><text x="130" y="26" font-size="11" font-weight="700" fill="#1565C0" font-family="system-ui">Nome</text><text x="260" y="26" font-size="11" font-weight="700" fill="#1565C0" font-family="system-ui">Significado</text><line x1="22" y1="50" x2="95" y2="50" stroke="#1565C0" stroke-width="2.5"/><line x1="87" y1="42" x2="87" y2="58" stroke="#1565C0" stroke-width="2.5"/><text x="130" y="54" font-size="12" fill="#1e293b" font-family="system-ui">Barra vertical</text><text x="260" y="54" font-size="12" fill="#475569" font-family="system-ui">Exatamente UM</text><line x1="22" y1="85" x2="75" y2="85" stroke="#1565C0" stroke-width="2.5"/><line x1="75" y1="73" x2="95" y2="85" stroke="#1565C0" stroke-width="2.5"/><line x1="75" y1="97" x2="95" y2="85" stroke="#1565C0" stroke-width="2.5"/><line x1="75" y1="85" x2="95" y2="85" stroke="#1565C0" stroke-width="2.5"/><text x="130" y="89" font-size="12" fill="#1e293b" font-family="system-ui">Pé de galho</text><text x="260" y="89" font-size="12" fill="#475569" font-family="system-ui">MUITOS (N)</text><line x1="22" y1="120" x2="95" y2="120" stroke="#1565C0" stroke-width="2.5"/><circle cx="72" cy="120" r="7" fill="none" stroke="#1565C0" stroke-width="2.5"/><line x1="85" y1="112" x2="85" y2="128" stroke="#1565C0" stroke-width="2.5"/><text x="130" y="124" font-size="12" fill="#1e293b" font-family="system-ui">Círculo + barra</text><text x="260" y="124" font-size="12" fill="#475569" font-family="system-ui">Zero ou Um (opcional)</text><line x1="22" y1="155" x2="68" y2="155" stroke="#1565C0" stroke-width="2.5"/><line x1="60" y1="147" x2="60" y2="163" stroke="#1565C0" stroke-width="2.5"/><line x1="68" y1="145" x2="92" y2="155" stroke="#1565C0" stroke-width="2.5"/><line x1="68" y1="165" x2="92" y2="155" stroke="#1565C0" stroke-width="2.5"/><line x1="68" y1="155" x2="92" y2="155" stroke="#1565C0" stroke-width="2.5"/><text x="130" y="159" font-size="12" fill="#1e293b" font-family="system-ui">Barra + pé de galho</text><text x="260" y="159" font-size="12" fill="#475569" font-family="system-ui">Um ou Muitos (obrigatório N)</text><rect x="22" y="185" width="90" height="28" fill="#1565C0" rx="3"/><text x="67" y="203" font-size="11" fill="#fff" text-anchor="middle" font-weight="700" font-family="system-ui">CATEGORIA</text><line x1="112" y1="199" x2="190" y2="199" stroke="#1565C0" stroke-width="2.5"/><line x1="122" y1="191" x2="122" y2="207" stroke="#1565C0" stroke-width="2.5"/><line x1="178" y1="189" x2="192" y2="199" stroke="#1565C0" stroke-width="2.5"/><line x1="178" y1="209" x2="192" y2="199" stroke="#1565C0" stroke-width="2.5"/><line x1="178" y1="199" x2="192" y2="199" stroke="#1565C0" stroke-width="2.5"/><rect x="192" y="185" width="80" height="28" fill="#1565C0" rx="3"/><text x="232" y="203" font-size="11" fill="#fff" text-anchor="middle" font-weight="700" font-family="system-ui">PRODUTO</text><text x="112" y="183" font-size="10" fill="#94a3b8" font-family="system-ui">1</text><text x="177" y="183" font-size="10" fill="#94a3b8" font-family="system-ui">N</text><text x="295" y="203" font-size="11" fill="#64748b" font-family="system-ui">← Exemplo: Categoria (1) → Produto (N)</text></svg><div class="hl"><strong>No Lucidchart:</strong> abra um diagrama ERD → use a forma "Entity". Conecte entidades com o conector "ERD Relationship" → nas propriedades da linha, escolha os símbolos de cardinalidade para cada ponta.</div>';} function(){return '<div class="ey">Quiz · 3 min</div><div class="stitle">Verificação de aprendizagem</div><div class="ssub">Turma responde junto.</div><div class="qb"><div class="qa">1. Uma loja tem vários produtos, mas cada produto pertence a uma única categoria. Qual é a cardinalidade entre Categoria e Produto?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>A</span>1 : 1</div><div class="qop" onclick="ansQ(this,\'c\',\'f0\')"><span>B</span>1 : N (Categoria para Produto)</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>C</span>N : M</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>D</span>N : 1 (Produto para Categoria)</div></div><div class="qfb" id="f0" style="background:#f0fdf4;color:#15803d">Correto! Uma Categoria tem N Produtos (1:N). A relação é nomeada pela entidade pai: Categoria é o "1", Produto é o "N". No diagrama: barra em Categoria, pé de galho em Produto.</div></div><div class="qb"><div class="qa">2. No crow\'s foot, o "pé de galho" (três linhas em leque) na ponta da linha representa:</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>A</span>Exatamente um registro</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>B</span>Zero registros</div><div class="qop" onclick="ansQ(this,\'c\',\'f1\')"><span>C</span>Muitos registros (N)</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>D</span>Opcional (0 ou 1)</div></div><div class="qfb" id="f1" style="background:#f0fdf4;color:#15803d">Correto! O pé de galho representa "muitos". Barra = um. Barra + pé de galho = "um ou muitos" (obrigatório no lado N). Círculo = opcional (zero permitido).</div></div>';},
function(){return '<div class="ey">Encerramento · 2 min</div><div class="stitle">Recapitulando</div><div class="ssub">O que aprendemos e o que vem agora.</div><div class="rl"><div class="ri"><div class="rn">1</div><div class="rt"><strong>BD e SGBD.</strong> Banco organiza os dados. SGBD (MySQL) gerencia. Workbench é o cliente visual. Modelar antes de codificar.</div></div><div class="ri"><div class="rn">2</div><div class="rt"><strong>Entidade e atributos.</strong> Entidade = coisa do mundo real (retângulo). Atributo = característica. Chave primária identifica unicamente cada linha.</div></div><div class="ri"><div class="rn">3</div><div class="rt"><strong>Relacionamentos.</strong> Linha entre entidades com verbo. Lido nos dois sentidos. No DER é conceitual — FK vem na implementação SQL.</div></div><div class="ri"><div class="rn">4</div><div class="rt"><strong>Cardinalidade.</strong> 1:1, 1:N, N:M. Para descobrir: pergunte "quantos dos dois lados?" para cada relacionamento.</div></div><div class="ri"><div class="rn">5</div><div class="rt"><strong>UML vs Crow\'s foot.</strong> UML usa números (1, *, 0..1). Crow\'s foot usa símbolos visuais — barra = um, pé de galho = muitos. Ambos são aceitos; crow\'s foot é padrão do Workbench e Lucidchart.</div></div></div><div class="hl"><strong>Próximo passo:</strong> demo ao vivo — modelar Produto, Categoria e Cliente no draw.io com as duas notações, lado a lado.</div>';}
];
function ansQ(el,t,id){var qb=el.closest('.qb');qb.querySelectorAll('.qop').forEach(function(o){if(o===el)o.classList.add(t==='c'?'correct':'wrong');else o.classList.add('dimmed');});var fb=document.getElementById(id);if(t!=='c'){fb.style.background='#fef2f2';fb.style.color='#dc2626';fb.textContent='Não exatamente — relembre como ler a cardinalidade dos dois lados.';}fb.style.display='block';}
function buildDots(){var bar=document.getElementById('dots-bar');bar.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('span');d.className='dot'+(i===0?' active':'');d.onclick=(function(idx){return function(){goTo(idx);};})(i);bar.appendChild(d);if(i<SLIDES.length-1){var sep=document.createElement('div');sep.className='dsep';bar.appendChild(sep);}}}
function buildSlides(){var area=document.getElementById('slide-area');area.innerHTML='';for(var i=0;i<SLIDES.length;i++){var div=document.createElement('div');div.className='slide'+(i===0?' active':'');div.id='slide-'+i;div.innerHTML=SLIDES[i]();area.appendChild(div);}}
function goTo(i){document.getElementById('slide-'+cur).classList.remove('active');var dots=document.querySelectorAll('.dot');dots[cur].classList.remove('active');if(i>cur)dots[cur].classList.add('done');cur=i;var el=document.getElementById('slide-'+cur);el.innerHTML=SLIDES[cur]();el.classList.add('active');dots[cur].classList.add('active');dots[cur].classList.remove('done');document.getElementById('slide-area').scrollTop=0;document.getElementById('btn-prev').disabled=(cur===0);var bn=document.getElementById('btn-next');bn.disabled=(cur===SLIDES.length-1);bn.textContent=(cur===SLIDES.length-1)?'Finalizar':'Próximo →';document.getElementById('counter').textContent=(cur+1)+' / '+SLIDES.length;if(!timerStarted){timerStarted=true;startTimer();}}
function goNav(dir){var ni=cur+dir;if(ni>=0&&ni<SLIDES.length)goTo(ni);}
function startTimer(){var rem=45*60;var el=document.getElementById('timer');timerInterval=setInterval(function(){rem--;var m=Math.floor(rem/60),s=rem%60;el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;if(rem<=300)el.className='timer warn';if(rem<=60)el.className='timer danger';if(rem<=0){clearInterval(timerInterval);el.textContent='00:00';}},1000);}
buildDots();buildSlides();document.getElementById('btn-prev').disabled=true;
</script>
